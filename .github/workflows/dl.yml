# .github/workflows/soundcloud-private-puppeteer.yml
name: 🎧 SoundCloud Private Downloader (Puppeteer)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud private track URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Puppeteer and FFmpeg
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          npm init -y
          npm install puppeteer

      - name: Restore cookies and download
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_COOKIES: ${{ secrets.SC_COOKIES }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          echo "$SC_COOKIES" > cookies.txt
          
          cat > download.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const { execSync } = require('child_process');
          const path = require('path');

          (async () => {
            const url = process.env.SC_URL;
            const cookiesText = fs.readFileSync('cookies.txt', 'utf8');
            
            // Parse Netscape cookie file into an array of cookies for Puppeteer
            const cookies = cookiesText
              .split('\n')
              .filter(line => line && !line.startsWith('#'))
              .map(line => {
                const parts = line.split('\t');
                if (parts.length >= 7) {
                  return {
                    name: parts[5].trim(),
                    value: parts[6].trim(),
                    domain: parts[0].trim().replace(/^\./, ''),
                    path: parts[2].trim(),
                    httpOnly: parts[3].trim() === 'TRUE',
                    secure: parts[1].trim() === 'TRUE',
                    expires: parseInt(parts[4]) || undefined
                  };
                }
              }).filter(c => c && c.name);

            console.log(`✅ Loaded ${cookies.length} cookies`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            // Set cookies before navigating
            await page.setCookie(...cookies);
            
            console.log('🎯 Opening track page...');
            await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
            
            // Extract track metadata
            const metadata = await page.evaluate(() => {
              const title = document.querySelector('meta[property="og:title"]')?.getAttribute('content') || 'unknown';
              const artist = document.querySelector('meta[property="soundcloud:author"]')?.getAttribute('content') || 'unknown';
              return { title, artist };
            });
            console.log(`🎵 ${metadata.artist} - ${metadata.title}`);

            let streamUrl = null;
            
            // Method 1: Intercept network requests and try to trigger playback
            await page.setRequestInterception(true);
            page.on('request', req => {
              const reqUrl = req.url();
              // Look for audio stream URLs (both .mp3 and HLS .m3u8)
              if (reqUrl.includes('.mp3') || reqUrl.includes('/media/') || reqUrl.includes('/stream/') || reqUrl.includes('.m3u8')) {
                console.log('🎯 Stream URL found:', reqUrl.substring(0, 120));
                streamUrl = reqUrl;
                req.abort(); // Don't actually load the stream in the browser
              } else {
                req.continue();
              }
            });

            // Click the Play button safely using evaluate
            const clicked = await page.evaluate(() => {
              const btn = document.querySelector('button.playControl') ||
                          document.querySelector('.playControl') ||
                          document.querySelector('[class*="playControl"]') ||
                          document.querySelector('button[title="Play"]');
              if (btn) {
                btn.click();
                return true;
              }
              return false;
            });
            
            if (clicked) {
              console.log('✅ Play button clicked, waiting for stream...');
              // Wait longer and also try to scroll a bit to ensure the player loads
              await page.evaluate(() => window.scrollBy(0, 300));
              await new Promise(r => setTimeout(r, 8000));
            } else {
              console.log('⚠️ Play button not found');
            }

            // Method 2: If stream not intercepted, try extracting from page source
            if (!streamUrl) {
              console.log('🔄 Searching for stream URL in page source...');
              const pageSource = await page.content();
              // Try to find stream URLs in the page's JavaScript state
              const matches = pageSource.match(/"url"\s*:\s*"(https:[^"]+\.mp3[^"]*)"/);
              if (matches) {
                streamUrl = matches[1].replace(/\\\//g, '/');
                console.log('🎯 Found in source');
              }
            }

            // Method 3: Try the oEmbed endpoint as last resort
            if (!streamUrl) {
              console.log('🔄 Trying oEmbed endpoint...');
              try {
                const oembedUrl = `https://soundcloud.com/oembed?format=json&url=${encodeURIComponent(url)}`;
                const response = await fetch(oembedUrl);
                const data = await response.json();
                // The oembed doesn't provide a direct stream, but confirms the track exists
                console.log('Track confirmed via oembed');
              } catch (e) {}
            }

            await browser.close();

            if (!streamUrl) {
              console.error('❌ No stream URL found');
              process.exit(1);
            }

            // Download with FFmpeg
            const safeName = `${metadata.artist} - ${metadata.title}`.replace(/[<>:"/\\|?*]/g, '').substring(0, 100);
            const output = path.join(process.env.OUTPUT_DIR, `${safeName}.mp3`);
            
            console.log('⬇️ Downloading with FFmpeg...');
            execSync(`ffmpeg -i "${streamUrl}" -c:a libmp3lame -b:a 320k -ar 44100 -y "${output}"`, { stdio: 'inherit' });
            
            if (fs.existsSync(output)) {
              const sizeMB = (fs.statSync(output).size / 1_048_576).toFixed(1);
              console.log(`✅ Saved: ${safeName}.mp3 (${sizeMB} MB)`);
            } else {
              console.error('❌ Download failed');
              process.exit(1);
            }
          })();
          SCRIPT
          
          node download.js

      - name: Cleanup temp files
        run: rm -f cookies.txt

      - name: Show files
        run: ls -lh "$OUTPUT_DIR"

      - name: Commit and push
        if: always()
        run: |
          find "$OUTPUT_DIR" -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add "$OUTPUT_DIR/"
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
