name: دانلود از ساندکلاد با soundcloud-dl-v2

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس URL موزیک ساندکلاد'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: نصب Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
      - name: نصب soundcloud-dl-v2
        run: cargo install soundcloud-dl-v2  # اطمینان حاصل کنید که crate در crates.io وجود دارد
      - name: دانلود موزیک
        run: scdl --url "${{ github.event.inputs.url }}" --use-default-metadata
      - name: ذخیره فایل MP3
        uses: actions/upload-artifact@v4
        with:
          name: soundcloud-track
          path: ./*.mp3
