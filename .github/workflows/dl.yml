# .github/workflows/soundcloud-private-puppeteer.yml
name: 🎧 SoundCloud Private Downloader (Puppeteer)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud private track URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: نصب Puppeteer و FFmpeg
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          npm init -y
          npm install puppeteer

      - name: بازسازی کوکی‌ها و دانلود
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_COOKIES: ${{ secrets.SC_COOKIES }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          echo "$SC_COOKIES" > cookies.txt
          
          cat > download.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const { execSync } = require('child_process');
          const path = require('path');

          (async () => {
            const url = process.env.SC_URL;
            const cookiesText = fs.readFileSync('cookies.txt', 'utf8');
            
            // تبدیل فایل کوکی Netscape به آرایه‌ای از کوکی‌ها
            const cookies = cookiesText
              .split('\n')
              .filter(line => line && !line.startsWith('#'))
              .map(line => {
                const parts = line.split('\t');
                if (parts.length >= 7) {
                  return {
                    name: parts[5].trim(),
                    value: parts[6].trim(),
                    domain: parts[0].trim().replace(/^\./, ''),
                    path: parts[2].trim(),
                    httpOnly: parts[3].trim() === 'TRUE',
                    secure: parts[1].trim() === 'TRUE',
                    expires: parseInt(parts[4]) || undefined
                  };
                }
              }).filter(c => c && c.name);

            console.log(`✅ بارگذاری ${cookies.length} کوکی`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            
            // تنظیم کوکی‌ها
            await page.setCookie(...cookies);
            
            console.log('🎯 باز کردن صفحه آهنگ...');
            await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
            
            // استخراج اطلاعات آهنگ
            const metadata = await page.evaluate(() => {
              const title = document.querySelector('meta[property="og:title"]')?.getAttribute('content') || 'unknown';
              const artist = document.querySelector('meta[property="soundcloud:author"]')?.getAttribute('content') || 'unknown';
              return { title, artist };
            });
            console.log(`🎵 ${metadata.artist} - ${metadata.title}`);

            let streamUrl = null;
            
            // روش ۱: رهگیری شبکه + کلیک ایمن
            await page.setRequestInterception(true);
            page.on('request', req => {
              const url = req.url();
              if (url.includes('.mp3') || url.includes('/media/') || url.includes('/stream/')) {
                console.log('🎯 لینک استریم پیدا شد:', url.substring(0, 100));
                streamUrl = url;
                req.abort();
              } else {
                req.continue();
              }
            });

            // کلیک با JavaScript خالص
            const clicked = await page.evaluate(() => {
              const btn = document.querySelector('button.playControl') ||
                          document.querySelector('.playControl') ||
                          document.querySelector('[class*="playControl"]') ||
                          document.querySelector('button[title="Play"]');
              if (btn) {
                btn.click();
                return true;
              }
              return false;
            });
            
            if (clicked) {
              console.log('✅ دکمه Play کلیک شد، منتظر استریم...');
              await new Promise(r => setTimeout(r, 5000));
            } else {
              console.log('⚠️ دکمه Play پیدا نشد');
            }

            // روش ۲: اگر استریم پیدا نشد، در source جستجو کن
            if (!streamUrl) {
              console.log('🔄 جستجوی URL در source صفحه...');
              const pageSource = await page.content();
              const match = pageSource.match(/"url":"(https:\\\/\\\/[^"]+\.mp3[^"]*)"/);
              if (match) {
                streamUrl = match[1].replace(/\\\//g, '/');
                console.log('🎯 از source پیدا شد');
              }
            }

            await browser.close();

            if (!streamUrl) {
              console.error('❌ هیچ لینک استریمی پیدا نشد');
              process.exit(1);
            }

            // دانلود با FFmpeg
            const safeName = `${metadata.artist} - ${metadata.title}`.replace(/[<>:"/\\|?*]/g, '').substring(0, 100);
            const output = path.join(process.env.OUTPUT_DIR, `${safeName}.mp3`);
            
            console.log('⬇️ دانلود با FFmpeg...');
            execSync(`ffmpeg -i "${streamUrl}" -c:a libmp3lame -b:a 320k -ar 44100 -y "${output}"`, { stdio: 'inherit' });
            
            if (fs.existsSync(output)) {
              const sizeMB = (fs.statSync(output).size / 1_048_576).toFixed(1);
              console.log(`✅ ذخیره شد: ${safeName}.mp3 (${sizeMB} MB)`);
            } else {
              console.error('❌ دانلود ناموفق');
              process.exit(1);
            }
          })();
          SCRIPT
          
          node download.js

      - name: پاکسازی فایل موقت
        run: rm -f cookies.txt

      - name: نمایش فایل‌ها
        run: ls -lh "$OUTPUT_DIR"

      - name: Commit و Push
        if: always()
        run: |
          find "$OUTPUT_DIR" -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add "$OUTPUT_DIR/"
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
