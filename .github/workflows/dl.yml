name: 🎧 SoundCloud Private (streamrip)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud private track URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg python3-pip
          pip3 install streamrip

      - name: استخراج توکن و دانلود مستقیم
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_COOKIES: ${{ secrets.SC_COOKIES }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          
          # 1. بازیابی کوکی‌ها
          echo "$SC_COOKIES" > cookies.txt
          
          # 2. استخراج oauth_token از فایل کوکی
          OAUTH_TOKEN=$(grep 'oauth_token' cookies.txt | awk '{print $NF}')
          if [ -z "$OAUTH_TOKEN" ]; then
            echo "❌ oauth_token در کوکی‌ها پیدا نشد"
            exit 1
          fi
          echo "🔑 OAuth Token: ${OAUTH_TOKEN:0:10}..."
          
          # 3. دانلود با streamrip، توکن را مستقیماً پاس می‌دهیم
          echo "⬇️ در حال دانلود آهنگ خصوصی..."
          rip url \
            --soundcloud-oauth-token "$OAUTH_TOKEN" \
            -d "$OUTPUT_DIR" \
            "$SC_URL"
          
          # 4. تبدیل فایل‌های غیر mp3 (در صورت وجود)
          cd "$OUTPUT_DIR"
          for f in *.m4a *.ogg *.opus *.flac; do
            [ -f "$f" ] || continue
            echo "🔄 تبدیل $f به MP3..."
            ffmpeg -i "$f" -c:a libmp3lame -b:a 320k -ar 44100 -y "${f%.*}.mp3" && rm "$f"
          done
          
          echo "📁 فایل‌های نهایی:"
          ls -lh *.mp3 2>/dev/null || echo "❌ هیچ فایل MP3 یافت نشد"

      - name: نمایش فایل‌ها
        run: ls -lh "$OUTPUT_DIR"

      - name: Commit و Push
        if: always()
        run: |
          find "$OUTPUT_DIR" -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add "$OUTPUT_DIR/"
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
