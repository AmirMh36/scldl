name: 🎧 SoundCloud Private (cookies + curl)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud private track URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq curl

      - name: Download private track
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_COOKIES: ${{ secrets.SC_COOKIES }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          
          # 1. بازسازی کوکی‌ها
          echo "$SC_COOKIES" > cookies.txt
          
          # 2. استخراج client_id از صفحه اصلی
          echo "🔑 Getting client_id..."
          CLIENT_ID=$(curl -s https://soundcloud.com | grep -oP 'client_id:\s*"\K[^"]+' | head -1)
          if [ -z "$CLIENT_ID" ]; then
            CLIENT_ID="a3e059563d7fd3372b49b37f00a00bcf" # پشتیبان
          fi
          echo "Client ID: $CLIENT_ID"
          
          # 3. resolve کردن URL و دریافت اطلاعات آهنگ
          echo "📡 Resolving track..."
          RESOLVE_URL="https://api-v2.soundcloud.com/resolve?url=${SC_URL}&client_id=${CLIENT_ID}"
          TRACK_INFO=$(curl -s -b cookies.txt "$RESOLVE_URL")
          
          TITLE=$(echo "$TRACK_INFO" | jq -r '.title // "unknown"')
          ARTIST=$(echo "$TRACK_INFO" | jq -r '.user.username // "unknown"')
          echo "🎵 $ARTIST - $TITLE"
          
          # 4. پیدا کردن progressive stream URL
          STREAM_URL=$(echo "$TRACK_INFO" | jq -r '
            .media.transcodings[] | 
            select(.format.protocol == "progressive") | 
            .url
          ' | head -1)
          
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            # اگر progressive نبود، اولین گزینه موجود را بردار
            STREAM_URL=$(echo "$TRACK_INFO" | jq -r '.media.transcodings[0].url // ""')
          fi
          
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            echo "❌ No stream URL found"
            exit 1
          fi
          
          # 5. دریافت لینک مستقیم دانلود
          echo "🔗 Getting direct download URL..."
          STREAM_RESPONSE=$(curl -s -b cookies.txt "${STREAM_URL}?client_id=${CLIENT_ID}")
          DOWNLOAD_URL=$(echo "$STREAM_RESPONSE" | jq -r '.url // ""')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ Could not extract download URL"
            exit 1
          fi
          
          # 6. دانلود با ffmpeg
          SAFE_NAME=$(echo "${ARTIST} - ${TITLE}" | sed 's/[<>:"/\\|?*]/_/g' | cut -c1-100)
          OUTPUT="${OUTPUT_DIR}/${SAFE_NAME}.mp3"
          
          echo "⬇️ Downloading..."
          ffmpeg -i "$DOWNLOAD_URL" \
            -c:a libmp3lame -b:a 320k -ar 44100 \
            -metadata title="$TITLE" \
            -metadata artist="$ARTIST" \
            -y "$OUTPUT" 2>&1 | tail -5
          
          if [ -f "$OUTPUT" ]; then
            SIZE=$(du -h "$OUTPUT" | cut -f1)
            echo "✅ Saved: ${SAFE_NAME}.mp3 ($SIZE)"
          else
            echo "❌ Download failed"
            exit 1
          fi

      - name: Show files
        run: ls -lh "$OUTPUT_DIR"

      - name: Commit and push
        if: always()
        run: |
          find "$OUTPUT_DIR" -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add "$OUTPUT_DIR/"
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
