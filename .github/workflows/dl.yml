# .github/workflows/soundcloud-private-stream.yml
name: SoundCloud Private (Puppeteer Stream)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک آهنگ خصوصی'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install system dependencies (optimized)
        run: |
          # بروزرسانی کش و نصب فقط ffmpeg, jq (curl از قبل نصب است)
          sudo apt-get update -o Acquire::http::No-Cache=True -o Acquire::BrokenProxy=true -y -qq || true
          sudo apt-get install -y -qq --no-install-recommends ffmpeg jq || true
          echo "✅ System deps checked"

      - name: Install puppeteer
        run: |
          npm init -y
          npm install puppeteer
          echo "✅ puppeteer installed"

      - name: Restore cookies and capture stream
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_COOKIES: ${{ secrets.SC_COOKIES }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          echo "$SC_COOKIES" > cookies.txt

          cat > get_stream.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const url = process.env.SC_URL;
            const cookiesText = fs.readFileSync('cookies.txt', 'utf8');
            
            const cookies = cookiesText.split('\n')
              .filter(line => line && !line.startsWith('#'))
              .map(line => {
                const p = line.split('\t');
                if (p.length >= 7) return {
                  name: p[5].trim(), value: p[6].trim(),
                  domain: p[0].trim().replace(/^\./, ''),
                  path: p[2].trim(), httpOnly: p[3].trim() === 'TRUE',
                  secure: p[1].trim() === 'TRUE', expires: parseInt(p[4]) || undefined
                };
              }).filter(c => c && c.name);
            
            console.log(`Cookies: ${cookies.length}`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox','--disable-setuid-sandbox','--autoplay-policy=no-user-gesture-required']
            });
            const page = await browser.newPage();
            await page.setCookie(...cookies);

            let streamUrl = null;
            await page.setRequestInterception(true);
            page.on('request', req => {
              const u = req.url();
              if (u.includes('.mp3') || u.includes('/media/') || u.includes('/stream/') || u.includes('.m3u8') || u.includes('/cenc/')) {
                console.log('🎯 stream:', u.substring(0,150));
                streamUrl = u;
                req.abort();
              } else {
                req.continue();
              }
            });

            console.log('goto...');
            await page.goto(url, { waitUntil: 'networkidle2', timeout: 40000 });

            const meta = await page.evaluate(() => ({
              title: document.querySelector('meta[property="og:title"]')?.content || 'Unknown',
              artist: document.querySelector('meta[property="soundcloud:author"]')?.content || 'Unknown'
            }));
            console.log(`🎵 ${meta.artist} - ${meta.title}`);

            const clicked = await page.evaluate(() => {
              const btn = document.querySelector('button.playControl') ||
                          document.querySelector('.playControl') ||
                          document.querySelector('[class*="playControl"]');
              if (btn) { btn.click(); return true; }
              return false;
            });
            console.log(`Play clicked: ${clicked}`);
            await new Promise(r => setTimeout(r, 7000));

            await browser.close();

            if (!streamUrl) {
              console.error('No stream captured');
              process.exit(1);
            }

            fs.writeFileSync('stream_info.json', JSON.stringify({
              url: streamUrl,
              headers: {
                'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
                'Referer': 'https://soundcloud.com/',
                'Origin': 'https://soundcloud.com'
              },
              metadata: meta
            }));
            console.log('stream_info.json saved');
          })();
          SCRIPT
          node get_stream.js

      - name: Download audio with curl
        if: success()
        run: |
          if [ ! -f stream_info.json ]; then exit 1; fi
          STREAM_URL=$(jq -r '.url' stream_info.json)
          TITLE=$(jq -r '.metadata.title' stream_info.json)
          ARTIST=$(jq -r '.metadata.artist' stream_info.json)
          SAFE_NAME=$(echo "${ARTIST} - ${TITLE}" | sed 's/[<>:"/\\|?*]/_/g' | cut -c1-100)
          
          curl -L -o "temp_audio" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            -H "Referer: https://soundcloud.com/" \
            -H "Origin: https://soundcloud.com" \
            -b cookies.txt \
            "$STREAM_URL"
          
          if [ -f temp_audio ] && [ $(stat -c%s temp_audio) -gt 10240 ]; then
            ffmpeg -i temp_audio -c:a libmp3lame -b:a 320k -ar 44100 \
              -metadata title="$TITLE" -metadata artist="$ARTIST" \
              -y "music-downloads/${SAFE_NAME}.mp3"
            rm temp_audio
            echo "✅ Downloaded: ${SAFE_NAME}.mp3"
          else
            echo "❌ Download failed or empty file"
            exit 1
          fi

      - name: Commit
        if: always()
        run: |
          find music-downloads -type f ! -name "*.mp3" -delete
          find music-downloads -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add music-downloads/
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
