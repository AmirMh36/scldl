# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string
      type:
        description: 'Type (track or playlist)'
        required: true
        type: choice
        options:
          - track
          - playlist
        default: 'track'

env:
  OUTPUT_DIR: downloads
  NODE_VERSION: '20'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          echo "✅ FFmpeg installed"

      - name: Create project and install dependency
        run: |
          mkdir -p sc-downloader
          cd sc-downloader
          npm init -y
          npm install @snwfdhmp/soundcloud-downloader

      - name: Create download script
        run: |
          cat > sc-downloader/download.js << 'SCRIPT_EOF'
          const fs = require('fs');
          const path = require('path');
          const { spawnSync } = require('child_process');
          const scdl = require('@snwfdhmp/soundcloud-downloader').default;

          const URL = process.env.SC_URL;
          const TYPE = process.env.SC_TYPE;
          const OUTPUT_DIR = process.env.OUTPUT_DIR || 'downloads';

          if (!fs.existsSync(OUTPUT_DIR)) {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
          }

          function cleanName(str) {
            return str
              .replace(/[<>:"/\\|?*]/g, '')
              .substring(0, 100) || 'unknown';
          }

          async function downloadTrack(trackUrl) {
            const info = await scdl.getInfo(trackUrl);
            const baseName = cleanName(`${info.user?.username || 'unknown'} - ${info.title || 'unknown'}`);
            const rawFile = path.join(OUTPUT_DIR, `${baseName}.m4a`);
            const finalFile = path.join(OUTPUT_DIR, `${baseName}.mp3`);

            console.log(`  ⬇ ${info.user?.username} - ${info.title}`);

            // Download raw stream
            const stream = await scdl.download(trackUrl);
            const writeStream = fs.createWriteStream(rawFile);
            stream.pipe(writeStream);

            await new Promise((resolve, reject) => {
              writeStream.on('finish', resolve);
              writeStream.on('error', reject);
              stream.on('error', reject);
            });

            const rawSize = (fs.statSync(rawFile).size / 1024 / 1024).toFixed(1);
            console.log(`  📥 Downloaded M4A: ${rawSize} MB`);

            // Convert M4A to MP3 using spawn (no buffer issue)
            console.log('  🔄 Converting to MP3...');
            
            const result = spawnSync('ffmpeg', [
              '-i', rawFile,
              '-codec:a', 'libmp3lame',
              '-b:a', '320k',
              '-ar', '44100',
              '-map_metadata', '0',
              '-y',
              finalFile
            ], {
              stdio: 'inherit',  // مستقیم به stdout/stderr هدایت کن نه pipe
              timeout: 120000
            });

            if (result.error) {
              console.error(`  ❌ FFmpeg error: ${result.error.message}`);
              // Keep M4A as fallback
              console.log(`  ⚠️ Saved M4A instead: ${baseName}.m4a`);
              return { fileName: `${baseName}.m4a`, filePath: rawFile };
            }

            if (result.status === 0) {
              const finalSize = (fs.statSync(finalFile).size / 1024 / 1024).toFixed(1);
              console.log(`  ✅ MP3: ${baseName}.mp3 (${finalSize} MB)`);
              
              // Delete raw M4A
              fs.unlinkSync(rawFile);
              
              return { fileName: `${baseName}.mp3`, filePath: finalFile };
            } else {
              console.log(`  ⚠️ FFmpeg failed, keeping M4A: ${baseName}.m4a`);
              return { fileName: `${baseName}.m4a`, filePath: rawFile };
            }
          }

          async function main() {
            console.log('\n🎵 SoundCloud Downloader\n');

            const results = [];

            if (TYPE === 'track') {
              const result = await downloadTrack(URL);
              results.push(result);
            } else {
              const playlist = await scdl.getSetInfo(URL);
              console.log(`📋 ${playlist.title} (${playlist.tracks.length} tracks)\n`);
              
              for (let i = 0; i < playlist.tracks.length; i++) {
                console.log(`[${i + 1}/${playlist.tracks.length}]`);
                try {
                  const result = await downloadTrack(playlist.tracks[i].permalink_url);
                  results.push(result);
                } catch (err) {
                  console.error(`  ⚠️ Skipped: ${err.message}`);
                }
              }
            }

            // Write summary
            fs.writeFileSync(
              path.join(OUTPUT_DIR, 'summary.json'),
              JSON.stringify({
                date: new Date().toISOString(),
                source: URL,
                type: TYPE,
                count: results.length,
                files: results.map(r => r.fileName)
              }, null, 2)
            );

            console.log(`\n✅ ${results.length} file(s) downloaded\n`);
          }

          main().catch(err => {
            console.error('❌', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          SCRIPT_EOF

      - name: Run downloader
        working-directory: sc-downloader
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_TYPE: ${{ github.event.inputs.type }}
        run: node download.js

      - name: Copy files to repo
        run: |
          mkdir -p music-downloads
          cp sc-downloader/downloads/*.mp3 music-downloads/ 2>/dev/null || true
          cp sc-downloader/downloads/*.m4a music-downloads/ 2>/dev/null || true
          cp sc-downloader/downloads/*.json music-downloads/ 2>/dev/null || true
          echo "Files ready to commit:"
          ls -lh music-downloads/

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Committed to repository!"
          fi
