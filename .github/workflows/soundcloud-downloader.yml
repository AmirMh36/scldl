# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          echo "✅ FFmpeg ready"

      - name: Install btch-downloader
        run: |
          npm install btch-downloader
          echo "✅ btch-downloader installed"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p music-downloads
          
          cat > download.js << 'SCRIPT_EOF'
          const { soundcloud } = require('btch-downloader');
          const fs = require('fs');
          const { execSync } = require('child_process');

          const url = process.env.SC_URL;
          
          console.log('🎵 Downloading from SoundCloud...');
          console.log('URL:', url);
          console.log('');
          
          soundcloud(url)
            .then(data => {
              console.log('📦 Response received!');
              console.log(JSON.stringify(data, null, 2));
              
              // Check what we got
              if (data && data.audio) {
                const audioUrl = data.audio;
                console.log('\n🎧 Audio URL:', audioUrl);
                console.log('📝 Title:', data.title || 'Unknown');
                console.log('👤 Artist:', data.author || data.artist || 'Unknown');
                
                // Save info
                fs.writeFileSync('music-downloads/info.json', JSON.stringify(data, null, 2));
                
                // Download audio file
                console.log('\n⬇ Downloading audio file...');
                const title = (data.title || 'track').replace(/[<>:"/\\|?*]/g, '');
                const output = `music-downloads/${title}.mp3`;
                
                execSync(`ffmpeg -i "${audioUrl}" -c:a libmp3lame -b:a 320k -ar 44100 -y "${output}"`, 
                  { stdio: 'inherit', timeout: 120000 }
                );
                
                if (fs.existsSync(output)) {
                  const size = (fs.statSync(output).size / 1024 / 1024).toFixed(1);
                  console.log(`\n✅ Downloaded: ${title}.mp3 (${size} MB)`);
                }
              } else if (data && data.download) {
                const downloadUrl = data.download;
                console.log('Download URL:', downloadUrl);
                execSync(`curl -L -o "music-downloads/track.mp3" "${downloadUrl}"`, { stdio: 'inherit' });
              } else {
                console.log('⚠️ Unexpected response format');
                // Save any data we got
                fs.writeFileSync('music-downloads/response.json', JSON.stringify(data, null, 2));
              }
            })
            .catch(err => {
              console.error('❌ Error:', err.message);
              process.exit(1);
            });
          SCRIPT_EOF
          
          node download.js

      - name: Convert to MP3 if needed
        run: |
          cd music-downloads
          
          # Convert any non-MP3 files
          for f in *.m4a *.ogg *.opus *.flac *.wav *.aac *.webm 2>/dev/null; do
            if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 10240 ]; then
              NAME="${f%.*}"
              echo "🔄 Converting: $f → ${NAME}.mp3"
              ffmpeg -nostdin -i "$f" -c:a libmp3lame -b:a 320k -ar 44100 -y "${NAME}.mp3" 2>/dev/null && rm "$f"
            fi
          done
          
          echo ""
          echo "📁 Final files:"
          ls -lh *.mp3 2>/dev/null || echo "No MP3 files"

      - name: Commit and push
        if: always()
        run: |
          # Clean up
          find music-downloads -type f \( -name "*.json" -o -name "*.txt" \) -delete 2>/dev/null || true
          find music-downloads -type f ! -name "*.mp3" -delete 2>/dev/null || true
          find music-downloads -type f -name "*.mp3" -size -10240c -delete 2>/dev/null || true
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Done!"
          fi
