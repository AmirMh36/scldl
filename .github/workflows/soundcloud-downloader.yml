# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install yt-dlp and FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod +x /usr/local/bin/yt-dlp
          echo "✅ yt-dlp $(yt-dlp --version)"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          
          echo "🎵 Downloading from SoundCloud..."
          echo "URL: $SC_URL"
          echo ""
          
          # Download with yt-dlp
          yt-dlp \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 320k \
            --embed-metadata \
            --add-header "Authorization:OAuth $SC_AUTH_TOKEN" \
            --no-playlist \
            -o "$OUTPUT_DIR/%(uploader)s - %(title)s.%(ext)s" \
            "$SC_URL"
          
          echo ""
          echo "Download complete. Checking files..."
          
          # List and validate files
          find "$OUTPUT_DIR" -name "*.mp3" -type f | while read -r f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            if [ "$SIZE" -gt 10000 ]; then
              echo "✅ $f (${SIZE_MB}MB)"
            else
              echo "⚠️ Removing invalid file: $f (${SIZE} bytes)"
              rm -f "$f"
            fi
          done

      - name: Fallback - try without format restriction
        if: always()
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          # Check if any valid MP3 exists
          VALID_COUNT=$(find "$OUTPUT_DIR" -name "*.mp3" -size +10k 2>/dev/null | wc -l)
          
          if [ "$VALID_COUNT" -eq 0 ]; then
            echo "No valid MP3 found. Trying fallback method..."
            
            # Download best available audio
            yt-dlp \
              --extract-audio \
              --audio-format best \
              --embed-metadata \
              --add-header "Authorization:OAuth $SC_AUTH_TOKEN" \
              --no-playlist \
              -o "$OUTPUT_DIR/%(uploader)s - %(title)s.%(ext)s" \
              "$SC_URL" || echo "Fallback also failed"
            
            # Convert any downloaded files to MP3
            find "$OUTPUT_DIR" -type f ! -name "*.mp3" ! -name ".gitkeep" | while read -r f; do
              BASENAME="${f%.*}"
              echo "Converting: $f"
              ffmpeg -i "$f" -c:a libmp3lame -b:a 320k -ar 44100 -y "${BASENAME}.mp3" 2>/dev/null
              if [ -f "${BASENAME}.mp3" ]; then
                rm -f "$f"
                echo "✅ Created: ${BASENAME}.mp3"
              fi
            done
          else
            echo "✅ Already have $VALID_COUNT valid MP3 file(s)"
          fi

      - name: Final file list
        if: always()
        run: |
          echo ""
          echo "📁 Final output:"
          ls -lh "$OUTPUT_DIR/"*.mp3 2>/dev/null || echo "No MP3 files in output"
          
          # Create summary
          cat > "$OUTPUT_DIR/summary.json" << EOF
          {
            "date": "$(date -Iseconds)",
            "source": "${{ github.event.inputs.url }}",
            "downloader": "yt-dlp",
            "files": $(ls "$OUTPUT_DIR"/*.mp3 2>/dev/null | xargs -I{} basename {} | jq -R . | jq -s .)
          }
          EOF

      - name: Commit and push
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          # Remove any invalid files
          find "$OUTPUT_DIR" -name "*.mp3" -size -10240c -delete 2>/dev/null || true
          find "$OUTPUT_DIR" -name "*.part" -delete 2>/dev/null || true
          find "$OUTPUT_DIR" -name "*.ytdl" -delete 2>/dev/null || true
          
          git add "$OUTPUT_DIR/"
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Files committed to repository!"
          fi
