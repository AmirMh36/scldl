# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install orpheusdl and soundcloud plugin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg python3-pip
          
          pip3 install orpheusdl
          pip3 install orpheusdl-soundcloud
          
          echo "✅ orpheusdl installed"

      - name: Configure orpheusdl
        run: |
          mkdir -p ~/.config/orpheusdl
          cat > ~/.config/orpheusdl/config.json << EOF
          {
            "soundcloud": {
              "client_id": "a3e059563d7fd3372b49b37f00a00bcf",
              "app_version": "1621419210"
            }
          }
          EOF
          echo "✅ Configured"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p music-downloads
          cd music-downloads
          
          echo "🎵 Downloading with orpheusdl..."
          echo "URL: $SC_URL"
          echo ""
          
          orpheusdl "$SC_URL" 2>&1
          
          echo ""
          echo "📁 Downloaded files:"
          ls -lhR

      - name: Convert to MP3 if needed
        run: |
          cd music-downloads
          
          # Find audio files and convert
          find . -type f \( -name "*.flac" -o -name "*.m4a" -o -name "*.ogg" -o -name "*.opus" \) | while read f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 10240 ]; then
              NAME="${f%.*}"
              echo "🔄 Converting: $f"
              ffmpeg -nostdin -i "$f" -c:a libmp3lame -b:a 320k -ar 44100 -y "${NAME}.mp3" 2>/dev/null && rm "$f"
            fi
          done
          
          echo ""
          echo "📁 Final MP3 files:"
          find . -name "*.mp3" -type f | while read f; do
            echo "  ✅ $f ($(du -h "$f" | cut -f1))"
          done

      - name: Commit and push
        if: always()
        run: |
          # Clean up
          find music-downloads -type f ! -name "*.mp3" -delete 2>/dev/null || true
          find music-downloads -type f -name "*.mp3" -size -10240c -delete 2>/dev/null || true
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Done!"
          fi
