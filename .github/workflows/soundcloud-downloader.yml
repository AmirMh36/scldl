# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

env:
  NODE_VERSION: '20'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq
          echo "✅ FFmpeg installed"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p music-downloads
          
          # Get SoundCloud Client ID (public, no auth needed)
          echo "🔑 Getting SoundCloud client ID..."
          CLIENT_ID=$(curl -s "https://soundcloud.com" | grep -oP 'client_id:\s*"\K[^"]+' | head -1)
          
          if [ -z "$CLIENT_ID" ]; then
            # Fallback - a known working public client ID pattern
            CLIENT_ID="a3e059563d7fd3372b49b37f00a00bcf"
          fi
          
          echo "Client ID: $CLIENT_ID"
          
          # Resolve the URL to get track info
          echo "🔍 Resolving URL..."
          RESOLVE_URL="https://api-v2.soundcloud.com/resolve?url=${SC_URL}&client_id=${CLIENT_ID}"
          
          TRACK_INFO=$(curl -s "$RESOLVE_URL")
          
          TITLE=$(echo "$TRACK_INFO" | jq -r '.title // "Unknown"')
          ARTIST=$(echo "$TRACK_INFO" | jq -r '.user.username // "Unknown"')
          STREAM_URL=$(echo "$TRACK_INFO" | jq -r '.media.transcodings[] | select(.format.protocol == "progressive") | .url' | head -1)
          
          # If no progressive stream, try HLS
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            echo "No progressive stream, trying HLS..."
            STREAM_URL=$(echo "$TRACK_INFO" | jq -r '.media.transcodings[0].url // ""')
          fi
          
          echo "Title: $TITLE"
          echo "Artist: $ARTIST"
          echo "Stream URL found: $([ -n "$STREAM_URL" ] && echo 'Yes' || echo 'No')"
          
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            echo "❌ No stream URL found"
            exit 1
          fi
          
          # Get actual stream URL
          echo "🔗 Getting stream URL..."
          STREAM_RESPONSE=$(curl -s "${STREAM_URL}?client_id=${CLIENT_ID}")
          ACTUAL_URL=$(echo "$STREAM_RESPONSE" | jq -r '.url // ""')
          
          if [ -z "$ACTUAL_URL" ] || [ "$ACTUAL_URL" = "null" ]; then
            echo "❌ Could not get actual stream URL"
            exit 1
          fi
          
          echo "Actual URL obtained"
          
          # Clean filename
          FILENAME=$(echo "${ARTIST} - ${TITLE}" | sed 's/[<>:"/\\|?*]/_/g')
          
          # Download and convert with FFmpeg
          echo "⬇ Downloading and converting to MP3..."
          ffmpeg -i "$ACTUAL_URL" \
            -codec:a libmp3lame \
            -b:a 320k \
            -ar 44100 \
            -metadata title="$TITLE" \
            -metadata artist="$ARTIST" \
            -metadata album="SoundCloud" \
            -y \
            "music-downloads/${FILENAME}.mp3" 2>&1 | tail -5
          
          if [ -f "music-downloads/${FILENAME}.mp3" ]; then
            SIZE=$(du -h "music-downloads/${FILENAME}.mp3" | cut -f1)
            echo "✅ Downloaded: ${FILENAME}.mp3 ($SIZE)"
          else
            echo "❌ Download failed"
            exit 1
          fi
          
          # Create summary
          cat > music-downloads/summary.json << EOF
          {
            "date": "$(date -Iseconds)",
            "source": "$SC_URL",
            "title": "$TITLE",
            "artist": "$ARTIST",
            "filename": "${FILENAME}.mp3"
          }
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Committed!"
          fi
