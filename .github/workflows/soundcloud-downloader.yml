name: 🎧 SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud share URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq curl

      - name: دانلود از SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          mkdir -p music-downloads
          
          echo "🎯 لینک: $SC_URL"
          
          # استخراج client_id زنده از صفحه اصلی
          CLIENT_ID=$(curl -s https://soundcloud.com | grep -oP 'client_id:\s*"\K[^"]+' | head -1)
          if [ -z "$CLIENT_ID" ]; then
            CLIENT_ID="a3e059563d7fd3372b49b37f00a00bcf" # پشتیبان
          fi
          echo "🔑 Client ID: $CLIENT_ID"
          
          # Resolve URL با توکن OAuth
          echo "📡 دریافت اطلاعات آهنگ..."
          TRACK_INFO=$(curl -s -H "Authorization: OAuth $SC_AUTH_TOKEN" \
            "https://api-v2.soundcloud.com/resolve?url=${SC_URL}&client_id=${CLIENT_ID}")
          
          # استخراج عنوان و هنرمند
          TITLE=$(echo "$TRACK_INFO" | jq -r '.title // "unknown"')
          ARTIST=$(echo "$TRACK_INFO" | jq -r '.user.username // "unknown"')
          echo "🎵 عنوان: $ARTIST - $TITLE"
          
          # پیدا کردن progressive stream URL
          STREAM_URL=$(echo "$TRACK_INFO" | jq -r '
            .media.transcodings[] | 
            select(.format.protocol == "progressive") | 
            .url
          ' | head -1)
          
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            # اگر progressive نبود، اولین HLS را بردار
            STREAM_URL=$(echo "$TRACK_INFO" | jq -r '.media.transcodings[0].url // ""')
          fi
          
          if [ -z "$STREAM_URL" ] || [ "$STREAM_URL" = "null" ]; then
            echo "❌ هیچ استریمی پیدا نشد"
            exit 1
          fi
          
          # دریافت URL واقعی استریم
          echo "🔗 دریافت لینک مستقیم..."
          STREAM_RESPONSE=$(curl -s -H "Authorization: OAuth $SC_AUTH_TOKEN" \
            "${STREAM_URL}?client_id=${CLIENT_ID}")
          DOWNLOAD_URL=$(echo "$STREAM_RESPONSE" | jq -r '.url // ""')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ لینک دانلود استخراج نشد"
            exit 1
          fi
          
          # نام‌فایل امن
          SAFE_NAME=$(echo "${ARTIST} - ${TITLE}" | sed 's/[<>:"/\\|?*]/_/g' | cut -c1-100)
          OUTPUT="music-downloads/${SAFE_NAME}.mp3"
          
          echo "⬇️ در حال دانلود و تبدیل..."
          ffmpeg -i "$DOWNLOAD_URL" \
            -c:a libmp3lame -b:a 320k -ar 44100 \
            -metadata title="$TITLE" \
            -metadata artist="$ARTIST" \
            -y "$OUTPUT" 2>&1 | tail -5
          
          if [ -f "$OUTPUT" ]; then
            SIZE=$(du -h "$OUTPUT" | cut -f1)
            echo "✅ دانلود کامل: ${SAFE_NAME}.mp3 ($SIZE)"
          else
            echo "❌ فایل نهایی ایجاد نشد"
            exit 1
          fi

      - name: نمایش فایل‌ها
        run: ls -lh music-downloads/

      - name: ذخیره در ریپازیتوری
        if: always()
        run: |
          find music-downloads -name "*.mp3" -size -10240c -delete
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add music-downloads/
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
