# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          echo "✅ FFmpeg ready"

      - name: Install btch-downloader
        run: |
          npm install btch-downloader
          echo "✅ btch-downloader installed"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p music-downloads
          
          cat > download.js << 'SCRIPT'
          const { soundcloud } = require('btch-downloader');
          const fs = require('fs');
          const { execSync } = require('child_process');

          const url = process.env.SC_URL;

          console.log('🎵 SoundCloud Downloader');
          console.log('URL:', url);
          console.log('');

          soundcloud(url)
            .then(data => {
              // Extract download URL from correct path
              const downloadUrl = data?.result?.downloadMp3 || 
                                 data?.result?.audio || 
                                 data?.downloadMp3 || 
                                 data?.audio || '';

              if (!downloadUrl || !downloadUrl.startsWith('http')) {
                console.error('❌ No download URL found');
                console.log('Response:', JSON.stringify(data, null, 2));
                process.exit(1);
              }

              const title = (data?.result?.title || 'soundcloud-track')
                .replace(/[<>:"/\\|?*]/g, '')
                .substring(0, 100);

              console.log('📝 Title:', title);
              console.log('🔗 Found download URL');
              console.log('⬇ Downloading...');

              const output = `music-downloads/${title}.mp3`;

              execSync(
                `ffmpeg -i "${downloadUrl}" -c:a libmp3lame -b:a 320k -ar 44100 -y "${output}"`,
                { stdio: 'inherit', timeout: 120000 }
              );

              if (fs.existsSync(output)) {
                const size = (fs.statSync(output).size / 1024 / 1024).toFixed(1);
                console.log(`\n✅ Done! ${title}.mp3 (${size} MB)`);
              } else {
                console.error('❌ File not created');
                process.exit(1);
              }
            })
            .catch(err => {
              console.error('❌ Error:', err.message);
              process.exit(1);
            });
          SCRIPT

          node download.js

      - name: Show result
        run: |
          echo ""
          echo "📁 Downloaded files:"
          ls -lh music-downloads/*.mp3 2>/dev/null || echo "No MP3 files"

      - name: Commit and push
        if: always()
        run: |
          # Clean up non-MP3 files
          find music-downloads -type f ! -name "*.mp3" -delete 2>/dev/null || true
          find music-downloads -type f -name "*.mp3" -size -10240c -delete 2>/dev/null || true
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Committed to repository!"
          fi
