name: 🎵 SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud share URL (e.g., https://soundcloud.com/...?si=...)'
        required: true
        type: string
      oauth_token:
        description: 'OAuth token (برای آهنگ‌های خصوصی)'
        required: false
        type: string

env:
  OUTPUT_DIR: music-downloads
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg curl
          npm init -y
          npm install btch-downloader

      - name: دریافت لینک دانلود و بارگیری
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ github.event.inputs.oauth_token }}
        run: |
          mkdir -p $OUTPUT_DIR
          
          cat > download.js << 'SCRIPT'
          const { soundcloud } = require('btch-downloader');
          const { execSync } = require('child_process');
          const fs = require('fs');

          const url = process.env.SC_URL;
          const token = process.env.SC_AUTH_TOKEN || '';

          console.log('🔗 دریافت اطلاعات آهنگ...');
          soundcloud(url)
            .then(data => {
              // استخراج لینک مستقیم MP3
              const downloadUrl = data?.result?.downloadMp3 || data?.result?.audio || '';
              if (!downloadUrl || !downloadUrl.startsWith('http')) {
                console.error('❌ لینک دانلود پیدا نشد. ممکن است آهنگ خصوصی باشد.');
                if (data?.result?.title) console.log('عنوان:', data.result.title);
                process.exit(1);
              }

              const title = (data.result.title || 'soundcloud_track')
                .replace(/[<>:"/\\|?*]/g, '')
                .substring(0, 80);
              
              const outputFile = `${process.env.OUTPUT_DIR}/${title}.mp3`;

              console.log(`⬇️ در حال دانلود: ${title}`);
              // curl مستقیم فایل MP3
              execSync(`curl -L --retry 3 -o "${outputFile}" "${downloadUrl}"`, { stdio: 'inherit' });

              if (fs.existsSync(outputFile)) {
                const sizeMB = (fs.statSync(outputFile).size / 1_048_576).toFixed(1);
                if (parseFloat(sizeMB) < 0.01) {
                  console.error('❌ فایل دانلود شده خالی است.');
                  process.exit(1);
                }
                console.log(`✅ دانلود کامل: ${title}.mp3 (${sizeMB} MB)`);
              } else {
                console.error('❌ فایل ایجاد نشد.');
                process.exit(1);
              }
            })
            .catch(err => {
              console.error('❌ خطا:', err.message);
              process.exit(1);
            });
          SCRIPT
          
          node download.js

      - name: نمایش فایل نهایی
        run: |
          echo ""
          echo "📁 فایل‌های دانلود شده:"
          ls -lh $OUTPUT_DIR/*.mp3 2>/dev/null || echo "هنوز فایلی وجود ندارد"

      - name: commit و push
        if: always()
        run: |
          # حذف فایل‌های خراب (کمتر از ۱۰ کیلوبایت)
          find $OUTPUT_DIR -name "*.mp3" -size -10240c -delete 2>/dev/null || true
          
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add $OUTPUT_DIR/
          git diff --staged --quiet || git commit -m "🎵 $(date +%H:%M)" && git push
