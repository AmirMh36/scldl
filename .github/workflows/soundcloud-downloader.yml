# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install yt-dlp and FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod +x /usr/local/bin/yt-dlp
          echo "✅ yt-dlp $(yt-dlp --version)"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          mkdir -p $OUTPUT_DIR
          cd $OUTPUT_DIR
          
          echo "🎵 Downloading with yt-dlp..."
          echo "URL: $SC_URL"
          echo ""
          
          # Use OAuth token for authentication
          # Try progressive MP3 first, fallback to HLS
          yt-dlp \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 320k \
            --embed-metadata \
            --embed-thumbnail \
            --add-header "Authorization:OAuth $SC_AUTH_TOKEN" \
            --no-playlist \
            -o "%(uploader)s - %(title)s.%(ext)s" \
            --verbose \
            "$SC_URL" 2>&1 | tee /tmp/yt-dlp.log
          
          echo ""
          echo "📁 Downloaded files:"
          ls -lh *.mp3 2>/dev/null || echo "No MP3 files yet"
          
          # Check if files are valid
          for f in *.mp3; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c%s "$f")
              if [ "$SIZE" -gt 10000 ]; then
                echo "✅ Valid: $f ($(echo "scale=1; $SIZE/1048576" | bc)MB)"
              else
                echo "⚠️ Invalid (too small): $f"
                rm "$f"
              fi
            fi
          done

      - name: If yt-dlp failed, try with cookies
        if: always()
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_AUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          VALID_FILES=$(find $OUTPUT_DIR -name "*.mp3" -size +10k 2>/dev/null | wc -l)
          
          if [ "$VALID_FILES" -eq 0 ]; then
            echo "⚠️ First attempt failed, trying alternative method..."
            
            cd $OUTPUT_DIR
            
            # Try without forcing MP3 - get whatever format is available
            yt-dlp \
              --extract-audio \
              --audio-format best \
              --embed-metadata \
              --add-header "Authorization:OAuth $SC_AUTH_TOKEN" \
              --no-playlist \
              -o "%(uploader)s - %(title)s.%(ext)s" \
              "$SC_URL" 2>&1 || true
            
            echo ""
            echo "📁 Files after fallback:"
            ls -lh *.* 2>/dev/null
            
            # Convert any non-MP3 to MP3
            for f in *.m4* *.ogg *.opus *.webm 2>/dev/null; do
              if [ -f "$f" ]; then
                BASENAME="${f%.*}"
                echo "Converting $f to MP3..."
                ffmpeg -i "$f" \
                  -c:a libmp3lame \
                  -b:a 320k \
                  -ar 44100 \
                  -y \
                  "${BASENAME}.mp3" 2>/dev/null
                
                if [ -f "${BASENAME}.mp3" ]; then
                  rm "$f"
                  echo "✅ Converted: ${BASENAME}.mp3"
                fi
              fi
            done
          fi

      - name: Commit and push
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          # Remove invalid/small files
          find $OUTPUT_DIR -name "*.mp3" -size -10k -delete 2>/dev/null || true
          find $OUTPUT_DIR -name "*.part" -delete 2>/dev/null || true
          find $OUTPUT_DIR -name "*.ytdl" -delete 2>/dev/null || true
          
          git add $OUTPUT_DIR/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Committed!"
          fi
