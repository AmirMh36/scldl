# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string
      type:
        description: 'Type (track or playlist)'
        required: true
        type: choice
        options:
          - track
          - playlist
        default: 'track'

env:
  OUTPUT_DIR: downloads
  NODE_VERSION: '20'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create project and install dependency
        run: |
          mkdir -p sc-downloader
          cd sc-downloader
          npm init -y
          npm install @snwfdhmp/soundcloud-downloader

      - name: Create download script
        run: |
          cat > sc-downloader/download.js << 'SCRIPT_EOF'
          const fs = require('fs');
          const path = require('path');
          const scdl = require('@snwfdhmp/soundcloud-downloader').default;

          const URL = process.env.SC_URL;
          const TYPE = process.env.SC_TYPE;
          const OUTPUT_DIR = process.env.OUTPUT_DIR || 'downloads';

          if (!fs.existsSync(OUTPUT_DIR)) {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
          }

          function cleanName(str, maxLen = 80) {
            return str
              .replace(/[<>:"/\\|?*]/g, '')
              .replace(/['']/g, "'")
              .replace(/[""]/g, '"')
              .trim()
              .substring(0, maxLen) || 'unknown';
          }

          async function downloadSingleTrack(trackUrl) {
            const info = await scdl.getInfo(trackUrl);
            const fileName = cleanName(`${info.user?.username || 'unknown'} - ${info.title || 'unknown'}`) + '.mp3';
            const filePath = path.join(OUTPUT_DIR, fileName);

            console.log(`  ⬇ Downloading: ${fileName}`);

            const stream = await scdl.download(trackUrl);
            const writeStream = fs.createWriteStream(filePath);
            stream.pipe(writeStream);

            await new Promise((resolve, reject) => {
              writeStream.on('finish', resolve);
              writeStream.on('error', reject);
            });

            const stats = fs.statSync(filePath);
            console.log(`  ✅ Saved: ${fileName} (${(stats.size / 1024 / 1024).toFixed(1)} MB)`);
            return { fileName, filePath, info };
          }

          async function main() {
            console.log('\n🎵 SoundCloud Downloader\n');

            const results = [];
            if (TYPE === 'track') {
              results.push(await downloadSingleTrack(URL));
            } else {
              const playlist = await scdl.getSetInfo(URL);
              console.log(`📋 Playlist: ${playlist.title} (${playlist.tracks.length} tracks)\n`);
              for (const track of playlist.tracks) {
                try {
                  results.push(await downloadSingleTrack(track.permalink_url));
                } catch (err) {
                  console.error(`  ⚠️ Skipped: ${err.message}`);
                }
              }
            }

            // Write summary
            fs.writeFileSync(
              path.join(OUTPUT_DIR, 'summary.json'),
              JSON.stringify({
                date: new Date().toISOString(),
                source: URL,
                count: results.length,
                files: results.map(r => r.fileName)
              }, null, 2)
            );

            console.log(`\n✅ Done! ${results.length} file(s) downloaded.`);
          }

          main().catch(err => {
            console.error('❌', err.message);
            process.exit(1);
          });
          SCRIPT_EOF

      - name: Run downloader
        working-directory: sc-downloader
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_TYPE: ${{ github.event.inputs.type }}
        run: node download.js

      - name: Copy files to repo
        run: |
          mkdir -p music-downloads
          cp sc-downloader/downloads/*.mp3 music-downloads/ 2>/dev/null || true
          cp sc-downloader/downloads/*.json music-downloads/ 2>/dev/null || true
          echo "Files copied to music-downloads/"
          ls -lh music-downloads/

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 Downloaded: $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Files committed to repository!"
          fi

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: soundcloud-backup-${{ github.run_id }}
          path: music-downloads/
          retention-days: 3
