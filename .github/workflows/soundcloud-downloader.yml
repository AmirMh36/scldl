# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install multidl-cli
        run: |
          npm install -g multidl-cli
          echo "✅ multidl-cli $(multidl --version 2>/dev/null || echo 'installed')"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_OAUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          mkdir -p music-downloads
          cd music-downloads
          
          echo "🎵 Downloading from SoundCloud..."
          echo "URL: $SC_URL"
          echo ""
          
          multidl \
            "$SC_URL" \
            --download-dir . \
            --oauth-token "$SC_OAUTH_TOKEN" \
            --quality high 2>&1
          
          echo ""
          echo "📁 Downloaded files:"
          ls -lh *.{mp3,m4a,flac,wav} 2>/dev/null || ls -lh

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Done!"
          fi
