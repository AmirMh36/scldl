# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js and FFmpeg
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          npm install -g multidl-cli
          echo "✅ Ready"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_OAUTH_TOKEN: ${{ secrets.SC_AUTH_TOKEN }}
        run: |
          mkdir -p music-downloads
          cd music-downloads
          
          echo "🎵 Downloading from SoundCloud..."
          echo "URL: $SC_URL"
          echo ""
          
          # Pass token via stdin
          echo "$SC_OAUTH_TOKEN" | multidl \
            "$SC_URL" \
            --download-dir . \
            --quality high 2>&1
          
          echo ""
          echo "📁 Downloaded files:"
          ls -lh

      - name: Convert M4A to MP3
        run: |
          cd music-downloads
          
          for f in *.m4a; do
            if [ -f "$f" ]; then
              BASENAME="${f%.m4a}"
              echo "🔄 Converting: $f → ${BASENAME}.mp3"
              
              ffmpeg -i "$f" \
                -c:a libmp3lame \
                -b:a 320k \
                -ar 44100 \
                -y \
                "${BASENAME}.mp3" 2>&1 | tail -1
              
              if [ -f "${BASENAME}.mp3" ] && [ $(stat -c%s "${BASENAME}.mp3") -gt 10000 ]; then
                echo "✅ Created: ${BASENAME}.mp3"
                rm "$f"  # Remove M4A
              else
                echo "⚠️ Conversion failed, keeping M4A"
              fi
            fi
          done
          
          echo ""
          echo "📁 Final files:"
          ls -lh *.mp3 2>/dev/null || echo "No MP3 files"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          # Remove non-MP3 files
          find music-downloads -type f ! -name "*.mp3" -delete 2>/dev/null || true
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ MP3 committed to repository!"
          fi
