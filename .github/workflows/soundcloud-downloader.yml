# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

env:
  OUTPUT_DIR: music-downloads

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python and scdl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip ffmpeg
          pip3 install scdl
          echo "✅ scdl installed"

      - name: Create scdl config
        run: |
          mkdir -p ~/.config/scdl
          cat > ~/.config/scdl/scdl.cfg << 'EOF'
          [scdl]
          auth_token = ${{ secrets.SC_AUTH_TOKEN }}
          path = ./music-downloads
          name_format = {user[username]} - {title}
          only_mp3 = true
          no_original = true
          continue = true
          EOF
          echo "✅ Config created"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p $OUTPUT_DIR
          
          echo "🎵 Downloading from SoundCloud..."
          echo "URL: $SC_URL"
          
          cd $OUTPUT_DIR
          
          scdl -l "$SC_URL" --onlymp3
          
          echo ""
          echo "✅ Download complete!"
          echo ""
          echo "📁 Files:"
          ls -lh *.mp3 2>/dev/null

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add $OUTPUT_DIR/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Files committed to repository!"
          fi
