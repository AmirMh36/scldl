# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string
      type:
        description: 'Type (track or playlist)'
        required: true
        type: choice
        options:
          - track
          - playlist
        default: 'track'

env:
  OUTPUT_DIR: downloads
  NODE_VERSION: '20'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Create project and install dependency
        run: |
          mkdir -p sc-downloader
          cd sc-downloader
          npm init -y
          npm install @snwfdhmp/soundcloud-downloader
          echo "✅ Dependencies installed"
          npm ls @snwfdhmp/soundcloud-downloader

      - name: Debug inputs
        run: |
          echo "URL: ${{ github.event.inputs.url }}"
          echo "TYPE: ${{ github.event.inputs.type }}"
          echo "Workspace: $(pwd)"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"

      - name: Create download script
        run: |
          cat > sc-downloader/download.js << 'SCRIPT_EOF'
          const fs = require('fs');
          const path = require('path');
          const scdl = require('@snwfdhmp/soundcloud-downloader').default;

          const URL = process.env.SC_URL;
          const TYPE = process.env.SC_TYPE;
          const OUTPUT_DIR = process.env.OUTPUT_DIR || 'downloads';

          console.log('=== DEBUG INFO ===');
          console.log('URL:', URL);
          console.log('TYPE:', TYPE);
          console.log('OUTPUT_DIR:', OUTPUT_DIR);
          console.log('CWD:', process.cwd());
          console.log('=================\n');

          if (!fs.existsSync(OUTPUT_DIR)) {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
            console.log(`Created directory: ${OUTPUT_DIR}`);
          }

          function cleanName(str, maxLen = 80) {
            return str
              .replace(/[<>:"/\\|?*]/g, '')
              .replace(/['']/g, "'")
              .replace(/[""]/g, '"')
              .trim()
              .substring(0, maxLen) || 'unknown';
          }

          async function downloadSingleTrack(trackUrl) {
            console.log(`\n📥 Getting info for: ${trackUrl}`);
            
            let info;
            try {
              info = await scdl.getInfo(trackUrl);
              console.log(`   Title: ${info.title}`);
              console.log(`   Artist: ${info.user?.username}`);
              console.log(`   Duration: ${info.duration}ms`);
              console.log(`   Downloadable: ${info.downloadable}`);
            } catch (err) {
              console.error('❌ Failed to get track info:', err.message);
              throw err;
            }

            const fileName = cleanName(`${info.user?.username || 'unknown'} - ${info.title || 'unknown'}`) + '.mp3';
            const filePath = path.join(OUTPUT_DIR, fileName);
            console.log(`   Output: ${filePath}`);

            try {
              const stream = await scdl.download(trackUrl);
              console.log('   Stream received, writing to file...');
              
              const writeStream = fs.createWriteStream(filePath);
              
              let downloadedBytes = 0;
              stream.on('data', (chunk) => {
                downloadedBytes += chunk.length;
                if (downloadedBytes % (1024 * 100) === 0) {  // log every 100KB
                  console.log(`   Downloaded: ${(downloadedBytes / 1024 / 1024).toFixed(2)} MB`);
                }
              });
              
              stream.pipe(writeStream);

              await new Promise((resolve, reject) => {
                writeStream.on('finish', () => {
                  console.log(`   Total: ${(downloadedBytes / 1024 / 1024).toFixed(2)} MB`);
                  resolve();
                });
                writeStream.on('error', reject);
                stream.on('error', reject);
              });

              console.log(`   ✅ File saved: ${fileName}`);
              
              // Verify file exists and has size
              if (fs.existsSync(filePath)) {
                const stats = fs.statSync(filePath);
                console.log(`   File size: ${(stats.size / 1024 / 1024).toFixed(2)} MB`);
                if (stats.size === 0) {
                  throw new Error('Downloaded file is empty (0 bytes)');
                }
              } else {
                throw new Error('File was not created');
              }
              
              return { fileName, filePath, info };
            } catch (err) {
              console.error('❌ Download failed:', err.message);
              throw err;
            }
          }

          async function main() {
            console.log('\n🎵 SoundCloud Downloader Starting...\n');

            const results = [];

            try {
              if (TYPE === 'track') {
                const result = await downloadSingleTrack(URL);
                results.push(result);
              } else if (TYPE === 'playlist') {
                console.log('📋 Fetching playlist info...');
                const playlist = await scdl.getSetInfo(URL);
                console.log(`   Playlist: ${playlist.title}`);
                console.log(`   Tracks: ${playlist.tracks.length}\n`);

                for (let i = 0; i < playlist.tracks.length; i++) {
                  console.log(`\n[${i + 1}/${playlist.tracks.length}]`);
                  try {
                    const result = await downloadSingleTrack(playlist.tracks[i].permalink_url);
                    results.push(result);
                  } catch (err) {
                    console.error(`   ⚠️ Skipping track ${i + 1}: ${err.message}`);
                  }
                }
              }

              // Write summary
              const summary = {
                downloadedAt: new Date().toISOString(),
                sourceUrl: URL,
                type: TYPE,
                totalTracks: results.length,
                files: results.map((r) => ({
                  file: r.fileName,
                  title: r.info?.title || 'unknown',
                  artist: r.info?.user?.username || 'unknown',
                  duration: r.info?.duration,
                  size: fs.statSync(r.filePath).size,
                })),
              };

              const summaryPath = path.join(OUTPUT_DIR, 'download-summary.json');
              fs.writeFileSync(summaryPath, JSON.stringify(summary, null, 2));
              console.log(`\n📊 Summary saved to: ${summaryPath}`);

              // List all files in output dir
              console.log('\n📁 Files in output directory:');
              const files = fs.readdirSync(OUTPUT_DIR);
              files.forEach((f) => {
                const stat = fs.statSync(path.join(OUTPUT_DIR, f));
                console.log(`   - ${f} (${(stat.size / 1024 / 1024).toFixed(2)} MB)`);
              });

              console.log(`\n✅ Done! ${results.length} file(s) downloaded.`);
              
              if (results.length === 0) {
                console.error('❌ No files were downloaded successfully!');
                process.exit(1);
              }
            } catch (err) {
              console.error('\n❌ Fatal error in main:', err.message);
              console.error(err.stack);
              process.exit(1);
            }
          }

          main();
          SCRIPT_EOF
          
          echo "✅ Script created"
          wc -l sc-downloader/download.js

      - name: Run downloader
        working-directory: sc-downloader
        env:
          SC_URL: ${{ github.event.inputs.url }}
          SC_TYPE: ${{ github.event.inputs.type }}
        run: node download.js

      - name: Check output files
        if: always()
        run: |
          echo "=== Checking output ==="
          if [ -d "sc-downloader/downloads" ]; then
            echo "Downloads directory exists"
            ls -lah sc-downloader/downloads/
            echo "Total files: $(ls -1 sc-downloader/downloads/ | wc -l)"
          else
            echo "❌ Downloads directory NOT found!"
            echo "Current directory contents:"
            ls -la sc-downloader/
          fi

      - name: Upload downloaded files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soundcloud-downloads-${{ github.run_id }}
          path: sc-downloader/downloads/
          retention-days: 7
          compression-level: 0
          if-no-files-found: warn

      - name: Show summary in job summary
        if: always()
        run: |
          echo "## 📊 SoundCloud Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f sc-downloader/downloads/download-summary.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat sc-downloader/downloads/download-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No summary file found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **[Download Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY
