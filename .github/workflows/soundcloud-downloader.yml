# .github/workflows/soundcloud-downloader.yml
name: SoundCloud Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js and FFmpeg
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          echo "✅ FFmpeg ready"

      - name: Install soundcloud-dl
        run: |
          npm install -g soundcloud-downloader-cli
          echo "✅ Installed"

      - name: Download from SoundCloud
        env:
          SC_URL: ${{ github.event.inputs.url }}
        run: |
          mkdir -p music-downloads
          cd music-downloads
          
          echo "🎵 Downloading with soundcloud-downloader-cli..."
          echo "URL: $SC_URL"
          echo ""
          
          sc-dl "$SC_URL" 2>&1
          
          echo ""
          echo "📁 Downloaded files:"
          ls -lh

      - name: Convert to MP3
        run: |
          cd music-downloads
          
          # Convert any audio file to MP3
          for f in *.m4a *.ogg *.opus *.flac *.wav *.aac *.webm 2>/dev/null; do
            if [ -f "$f" ] && [ $(stat -c%s "$f" 2>/dev/null || echo 0) -gt 10240 ]; then
              NAME="${f%.*}"
              echo "🔄 Converting: $f → ${NAME}.mp3"
              ffmpeg -nostdin -i "$f" -c:a libmp3lame -b:a 320k -ar 44100 -y "${NAME}.mp3" 2>/dev/null
              if [ -f "${NAME}.mp3" ]; then
                rm "$f"
                echo "  ✅ ${NAME}.mp3 ($(du -h "${NAME}.mp3" | cut -f1))"
              fi
            fi
          done
          
          echo ""
          echo "📁 Final MP3 files:"
          ls -lh *.mp3 2>/dev/null || echo "No MP3 files"

      - name: Commit and push
        run: |
          find music-downloads -type f ! -name "*.mp3" -delete 2>/dev/null || true
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add music-downloads/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🎵 $(date +%Y-%m-%d_%H-%M-%S)"
            git push
            echo "✅ Done!"
          fi
