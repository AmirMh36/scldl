name: SoundCloud  2

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results (1-50)'
        required: false
        type: string
        default: '10'
      use_proxy:
        description: 'Use free proxy?'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
          USE_PROXY: ${{ github.event.inputs.use_proxy }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const https = require('https');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
          const randomSi = () => Array.from({length: 32}, () => Math.floor(Math.random() * 16).toString(16)).join('');

          // استخراج client_id از صفحه اصلی SoundCloud
          async function getClientIdFromPage(page) {
            try {
              await page.goto('https://soundcloud.com/', { waitUntil: 'networkidle2', timeout: 30000 });
              const html = await page.content();
              const match = html.match(/client_id\s*:\s*"([^"]+)"/);
              return match ? match[1] : null;
            } catch(e) {
              return null;
            }
          }

          // درخواست API با client_id داده شده
          function apiRequest(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve(null); }
                });
              }).on('error', reject);
            });
          }

          // دریافت اطلاعات از API (resolve)
          async function enrichViaApi(track, clientId) {
            if (!clientId) return null;
            try {
              const resolveUrl = `https://api-v2.soundcloud.com/resolve?url=${encodeURIComponent(track.url)}&client_id=${clientId}`;
              const data = await apiRequest(resolveUrl);
              if (data && data.created_at) {
                return {
                  created_at: data.created_at,
                  artwork_url: (data.artwork_url || '').replace('large', 't500x500'),
                  duration: data.duration
                };
              }
            } catch(e) {}
            return null;
          }

          // دریافت اطلاعات از صفحه آهنگ (fallback)
          async function enrichViaPage(browser, url) {
            const page = await browser.newPage();
            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 20000 });
              await sleep(1500);
              const metadata = await page.evaluate(() => {
                const getMeta = (prop) => {
                  const el = document.querySelector(`meta[property="og:${prop}"]`) || document.querySelector(`meta[name="${prop}"]`);
                  return el ? el.getAttribute('content') : '';
                };
                return {
                  title: getMeta('title'),
                  image: getMeta('image'),
                  description: getMeta('description'),
                  date: (() => {
                    const scripts = document.querySelectorAll('script');
                    for (const s of scripts) {
                      const text = s.textContent;
                      const match = text.match(/"created_at"\s*:\s*"([^"]+)"/);
                      if (match) return match[1];
                    }
                    return '';
                  })()
                };
              });
              await page.close();
              return {
                created_at: metadata.date || '',
                artwork_url: metadata.image ? metadata.image.replace('large', 't500x500') : '',
                duration: null
              };
            } catch(e) {
              await page.close();
              return null;
            }
          }

          (async () => {
            const artist = process.env.ARTIST.trim();
            const song = process.env.SONG.trim();
            const limit = parseInt(process.env.LIMIT) || 10;
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🎵 Searching: "${query}"\n`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              ]
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });

            // 1. استخراج client_id زنده
            const clientId = await getClientIdFromPage(page);
            console.log(`🔑 Client ID: ${clientId || 'not found (will use fallback)'}\n`);

            // 2. پیدا کردن پروفایل هنرمند
            const peopleSearchUrl = `https://soundcloud.com/search/people?q=${encodeURIComponent(artist)}`;
            await page.goto(peopleSearchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(3000);

            const profileLinks = await page.evaluate(() => {
              const links = document.querySelectorAll('a[href^="/"]');
              const results = [];
              for (const a of links) {
                const href = a.getAttribute('href');
                if (href && href.split('/').filter(Boolean).length === 1 && !href.includes('search')) {
                  results.push({ url: 'https://soundcloud.com' + href, name: a.textContent.trim() });
                }
              }
              return results;
            });

            let artistProfileUrl = null;
            for (const link of profileLinks) {
              if (link.name.toLowerCase() === artist.toLowerCase()) {
                artistProfileUrl = link.url;
                break;
              }
            }
            if (!artistProfileUrl && profileLinks.length > 0) {
              artistProfileUrl = profileLinks[0].url;
            }
            if (!artistProfileUrl) {
              console.log('❌ Artist profile not found.');
              await browser.close();
              process.exit(0);
            }
            console.log(`✅ Artist profile: ${artistProfileUrl}`);

            // 3. رفتن به صفحه آهنگ‌های محبوب
            const tracksPageUrl = artistProfileUrl + '/popular-tracks';
            await page.goto(tracksPageUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(4000);

            for (let i = 0; i < 10; i++) {
              await page.evaluate(() => window.scrollBy(0, 800));
              await sleep(1500);
            }

            // 4. استخراج لینک‌ها از صفحه
            let tracks = await page.evaluate(() => {
              const items = document.querySelectorAll(
                'li.soundList__item, article.audible, div.sound__body, li[class*="trackList__item"], div[class*="track"]'
              );
              const results = [];
              const seen = new Set();
              items.forEach(item => {
                try {
                  const titleEl = item.querySelector('a[class*="soundTitle__title"], a[class*="title"], a[aria-label]');
                  const artistEl = item.querySelector('a[class*="soundTitle__username"], a[class*="owner"], span[class*="username"]');
                  const href = titleEl ? titleEl.getAttribute('href') : '';
                  const title = titleEl ? titleEl.textContent.trim() : '';
                  const trackArtist = artistEl ? artistEl.textContent.trim() : '';
                  if (title && href && href.startsWith('/') && href.split('/').filter(Boolean).length >= 2 && !href.includes('/you/') && !href.includes('/search/') && !href.includes('/feed') && !href.includes('/discover')) {
                    if (!seen.has(href)) {
                      seen.add(href);
                      results.push({
                        title,
                        artist: trackArtist,
                        url: 'https://soundcloud.com' + href.split('?')[0]
                      });
                    }
                  }
                } catch(e) {}
              });
              return results;
            });

            await page.close();
            console.log(`Found ${tracks.length} tracks. Fetching details...\n`);

            // 5. دریافت اطلاعات تکمیلی (تاریخ، کاور، مدت)
            const enrichedTracks = [];
            for (const t of tracks.slice(0, limit)) {
              console.log(`   Processing: ${t.title}`);
              let extra = null;
              if (clientId) {
                extra = await enrichViaApi(t, clientId);
              }
              if (!extra) {
                extra = await enrichViaPage(browser, t.url);
              }

              t.created_at = extra?.created_at || '';
              t.thumbnail = extra?.artwork_url || '';
              if (extra?.duration) {
                const mins = Math.floor(extra.duration / 60000);
                const secs = Math.floor((extra.duration % 60000) / 1000);
                t.duration = `${mins}:${secs.toString().padStart(2,'0')}`;
              }
              enrichedTracks.push(t);
              await sleep(300);
            }

            await browser.close();

            // 6. مرتب‌سازی بر اساس تاریخ انتشار (جدیدترین اول)
            enrichedTracks.sort((a, b) => {
              const dateA = a.created_at || '';
              const dateB = b.created_at || '';
              if (!dateA && !dateB) return 0;
              if (!dateA) return 1;  // بدون تاریخ می‌ره آخر
              if (!dateB) return -1;
              return new Date(dateB) - new Date(dateA);
            });

            // 7. آماده‌سازی نهایی و ذخیره
            const finalTracks = enrichedTracks.map((t, i) => ({
              ...t,
              shareUrl: t.url + '?si=' + randomSi() + '&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing',
              index: i + 1,
              date: t.created_at ? new Date(t.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '—',
              duration: t.duration || '—'
            }));

            const dir = `results/${artist}`;
            fs.mkdirSync(dir, { recursive: true });

            if (finalTracks.length === 0) {
              fs.writeFileSync(`${dir}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }

            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n**${finalTracks.length} tracks** · Sorted by newest\n\n</div>\n\n`;
            md += '<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Date</th><th>Share Link</th></tr>\n';
            let linksTxt = `# ${artist} (sorted by newest)\n\n`;
            let jsonTracks = [];

            finalTracks.forEach(t => {
              const cover = t.thumbnail ? `<img src="${t.thumbnail}" width="80" height="80" style="border-radius:8px">` : '🎵';
              md += `<tr>`;
              md += `<td align="center">${t.index}</td>`;
              md += `<td align="center">${cover}</td>`;
              md += `<td><strong>${t.artist || artist} — ${t.title}</strong></td>`;
              md += `<td align="center"><code>${t.duration}</code></td>`;
              md += `<td align="center">${t.date}</td>`;
              md += `<td align="center"><a href="${t.shareUrl}" target="_blank">🔗 Share</a></td>`;
              md += `</tr>\n`;
              
              linksTxt += `${t.shareUrl}\n`;
              jsonTracks.push({
                index: t.index,
                artist: t.artist || artist,
                title: t.title,
                url: t.url,
                shareUrl: t.shareUrl,
                duration: t.duration,
                date: t.date,
                thumbnail: t.thumbnail
              });
              console.log(`${t.index}. ${t.artist || artist} — ${t.title}  [${t.duration}]  ${t.date}`);
              console.log(`   🔗 ${t.shareUrl}\n`);
            });

            md += '</table>\n\n---\n\n## 📋 Share Links\n\n';
            finalTracks.forEach(t => {
              md += `- **${t.index}.** [${t.artist || artist} — ${t.title}](${t.shareUrl}) \`${t.duration}\` — ${t.date}\n`;
            });

            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, linksTxt);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({ artist, query, total: finalTracks.length, tracks: jsonTracks }, null, 2));
            console.log(`✅ Saved ${finalTracks.length} tracks to ${dir}/`);
          })();
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          ARTIST="${{ github.event.inputs.artist }}"
          cat "results/$ARTIST/links.txt" 2>/dev/null || echo "No results"

      - name: Commit
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
