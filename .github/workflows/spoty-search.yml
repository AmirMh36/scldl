name: 🎧 Spotify Search (Puppeteer Token)

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Number of results (1-50)'
        required: false
        type: string
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js & Puppeteer
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          npm init -y
          npm install puppeteer

      - name: Get Guest Token & Search
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p "results/$ARTIST"
          
          cat > get_token_and_search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const https = require('https');

          (async () => {
            const query = process.env.ARTIST + (process.env.SONG ? ' ' + process.env.SONG : '');
            const limit = parseInt(process.env.LIMIT) || 10;

            console.log(`🎵 Searching: "${query}"`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--autoplay-policy=no-user-gesture-required']
            });
            const page = await browser.newPage();

            // شکار توکن از Network
            let accessToken = null;
            await page.setRequestInterception(true);
            page.on('request', req => {
              const url = req.url();
              if (url.includes('api.spotify.com/v1') && !accessToken) {
                const authHeader = req.headers()['authorization'];
                if (authHeader && authHeader.startsWith('Bearer ')) {
                  accessToken = authHeader.split(' ')[1];
                  console.log('🎯 Token captured from network');
                }
              }
              req.continue();
            });

            console.log('Opening Spotify to capture token...');
            await page.goto('https://open.spotify.com', { waitUntil: 'networkidle2', timeout: 40000 });
            await new Promise(r => setTimeout(r, 3000));

            // اگر توکن از Network شکار نشد، از localStorage بردار
            if (!accessToken) {
              accessToken = await page.evaluate(() => {
                try {
                  const token = JSON.parse(localStorage.getItem('sp://oauth2')).accessToken;
                  return token;
                } catch(e) { return null; }
              });
              if (accessToken) console.log('🎯 Token found in localStorage');
            }

            await browser.close();

            if (!accessToken) {
              console.error('❌ Could not get token.');
              process.exit(1);
            }

            console.log('✅ Token obtained, searching...');
            
            // جستجو با API
            const searchUrl = `https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=${limit}`;
            const options = { headers: { 'Authorization': `Bearer ${accessToken}` } };

            https.get(searchUrl, options, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                const result = JSON.parse(data);
                const tracks = result.tracks?.items || [];
                
                if (!tracks.length) {
                  console.log('❌ No tracks found.');
                  process.exit(0);
                }

                console.log(`✅ Found ${tracks.length} tracks\n`);
                
                const allLinks = tracks.map((t, i) => ({
                  index: i + 1,
                  title: t.name,
                  artist: t.artists.map(a => a.name).join(', '),
                  album: t.album.name,
                  release_date: t.album.release_date,
                  duration: `${Math.floor(t.duration_ms/60000)}:${String(Math.floor((t.duration_ms%60000)/1000)).padStart(2,'0')}`,
                  popularity: t.popularity,
                  spotify_url: t.external_urls.spotify,
                  cover: t.album.images[0]?.url || ''
                }));

                allLinks.forEach(t => {
                  console.log(`${t.index}. ${t.artist} — ${t.title}  [${t.duration}]`);
                  console.log(`   🔗 ${t.spotify_url}\n`);
                });

                // ذخیره‌سازی
                const dir = `results/${process.env.ARTIST}`;
                fs.mkdirSync(dir, { recursive: true });

                let md = `<div align="center">\n\n# 🎵 ${process.env.ARTIST}\n\n**${allLinks.length} tracks**\n\n</div>\n\n`;
                md += "<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Link</th></tr>\n";
                let linksTxt = `# ${process.env.ARTIST}\n\n`;

                allLinks.forEach(t => {
                  const coverHtml = t.cover ? `<img src="${t.cover}" width="80" height="80" style="border-radius:8px">` : '🎵';
                  md += `<tr><td>${t.index}</td><td>${coverHtml}</td><td><strong>${t.artist} — ${t.title}</strong></td><td><code>${t.duration}</code></td><td><a href="${t.spotify_url}">🔗 Open</a></td></tr>\n`;
                  linksTxt += `${t.spotify_url}\n`;
                });
                md += "</table>";

                fs.writeFileSync(`${dir}/README.md`, md);
                fs.writeFileSync(`${dir}/links.txt`, linksTxt);
                fs.writeFileSync(`${dir}/links.json`, JSON.stringify({ artist: process.env.ARTIST, query, total: allLinks.length, tracks: allLinks }, null, 2));
                console.log(`✅ Files saved to ${dir}/`);
              });
            }).on('error', e => console.error(e));
          })();
          SCRIPT
          
          node get_token_and_search.js

      - name: Show links
        if: always()
        run: cat results/${{ github.event.inputs.artist }}/links.txt 2>/dev/null || echo "No results"

      - name: Commit
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🎧 ${{ github.event.inputs.artist }}" && git push
