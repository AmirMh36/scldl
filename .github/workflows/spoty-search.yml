# .github/workflows/spotify-search-noauth.yml
name: 🎧 Spotify Search (No Auth)

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name (e.g., The Weeknd)'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Number of results (1-50)'
        required: false
        type: string
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SpotAPI
        run: pip install spotapi

      - name: Search & Save Results
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p "results/$ARTIST"
          python3 << 'PYEOF'
          import json, os
          from spotapi import Song

          artist = os.environ['ARTIST'].strip()
          song = os.environ.get('SONG', '').strip()
          limit = int(os.environ.get('LIMIT', 10))
          query = f"{artist} {song}" if song else artist

          print(f"🎵 Searching: \"{query}\"")
          print(f"Limit: {limit}\n")

          # 🔍 بدون هیچ احراز هویتی (guest access)
          song_api = Song()
          data = song_api.query_songs(query, limit=limit)
          
          items = data.get("data", {}).get("searchV2", {}).get("tracksV2", {}).get("items", [])
          
          if not items:
              print("❌ No tracks found.")
              with open(f"results/{artist}/README.md", 'w', encoding='utf-8') as f:
                  f.write(f"# {artist}\n\n❌ No results found.")
              exit()

          print(f"✅ Found {len(items)} tracks\n")

          # 🏗️ Build structured data
          tracks = []
          for idx, item in enumerate(items):
              track = item.get("item", {}).get("data", {})
              name = track.get("name", "Unknown")
              artists = track.get("artists", {})
              artist_name = artists.get("items", [{}])[0].get("profile", {}).get("name", "Unknown") if artists.get("items") else "Unknown"
              album = track.get("albumOfTrack", {})
              album_name = album.get("name", "") if album else ""
              release_date = album.get("date", {}).get("isoString", "") if album else ""
              duration_ms = track.get("duration", {}).get("totalMilliseconds", 0) if track.get("duration") else 0
              mins = duration_ms // 60000
              secs = (duration_ms % 60000) // 1000
              duration = f"{mins}:{secs:02d}"
              
              uri = track.get("uri", "")
              spotify_url = f"https://open.spotify.com/track/{uri.split(':')[-1]}" if uri else ""
              
              cover = ""
              if album and album.get("coverArt", {}).get("sources"):
                  sources = album["coverArt"]["sources"]
                  cover = sources[-1].get("url", sources[0].get("url", "")) if sources else ""

              track_info = {
                  'index': idx + 1,
                  'title': name,
                  'artist': artist_name,
                  'album': album_name,
                  'release_date': release_date[:10] if release_date else '',
                  'duration': duration,
                  'spotify_url': spotify_url,
                  'cover': cover
              }
              tracks.append(track_info)
              print(f"{idx+1}. {artist_name} — {name}  [{duration}]")
              print(f"   💿 {album_name} | 📅 {release_date[:10] if release_date else '—'}")
              print(f"   🔗 {spotify_url}\n")

          # 💾 Save files
          dir = f"results/{artist}"
          os.makedirs(dir, exist_ok=True)

          # README.md (with covers)
          md = f"<div align=\"center\">\n\n# 🎵 {artist}\n\n**{len(tracks)} tracks**\n\n</div>\n\n"
          md += "<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Spotify Link</th></tr>\n"
          links_txt = f"# {artist} — Spotify Links\n\n"
          json_tracks = []

          for t in tracks:
              cover_html = f"<img src=\"{t['cover']}\" width=\"80\" height=\"80\" style=\"border-radius:8px\">" if t['cover'] else "🎵"
              md += f"<tr><td align=\"center\">{t['index']}</td><td align=\"center\">{cover_html}</td><td><strong>{t['artist']} — {t['title']}</strong></td><td align=\"center\"><code>{t['duration']}</code></td><td align=\"center\"><a href=\"{t['spotify_url']}\" target=\"_blank\">🔗 Open</a></td></tr>\n"
              links_txt += f"{t['spotify_url']}\n"
              json_tracks.append(t)

          md += "</table>\n\n---\n\n## 📋 All Spotify Links\n\n"
          for t in tracks:
              md += f"- **{t['index']}.** [{t['artist']} — {t['title']}]({t['spotify_url']}) `{t['duration']}`\n"

          with open(f"{dir}/README.md", 'w', encoding='utf-8') as f: f.write(md)
          with open(f"{dir}/links.txt", 'w', encoding='utf-8') as f: f.write(links_txt)
          with open(f"{dir}/links.json", 'w', encoding='utf-8') as f:
              json.dump({'artist': artist, 'query': query, 'total': len(tracks), 'tracks': json_tracks}, f, indent=2)

          print(f"✅ Files saved to {dir}/")
          PYEOF

      - name: Show links
        run: cat results/${{ github.event.inputs.artist }}/links.txt 2>/dev/null || echo "No results"

      - name: Commit
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🎧 ${{ github.event.inputs.artist }}" && git push
