# .github/workflows/spotify-search-ytdlp.yml
name: 🎧 Spotify Search (No Auth - yt-dlp)

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name (e.g., The Weeknd)'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Number of results (1-50)'
        required: false
        type: string
        default: '10'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install yt-dlp & jq
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          python3 -m pip install -U yt-dlp

      - name: Search Spotify & Extract Links
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p "results/$ARTIST"
          QUERY="$ARTIST $SONG"
          
          echo "🎵 Searching Spotify: \"$QUERY\""
          
          # جستجو با yt-dlp (خروجی JSON)
          yt-dlp \
            --flat-playlist \
            --dump-json \
            --no-download \
            --default-search "spotify" \
            --max-downloads "$LIMIT" \
            "$QUERY" > "results/$ARTIST/raw.json" 2>/dev/null
          
          # تبدیل خروجی به فرمت‌های دلخواه
          python3 << 'PYEOF'
          import json, os, re
          
          artist = os.environ['ARTIST']
          limit = int(os.environ.get('LIMIT', 10))
          query = f"{artist} {os.environ.get('SONG', '')}".strip()
          dir = f"results/{artist}"
          
          tracks = []
          with open(f"{dir}/raw.json", 'r') as f:
              for line in f:
                  if line.startswith('{'):
                      try:
                          tracks.append(json.loads(line))
                      except:
                          pass
          
          if not tracks:
              print("❌ No tracks found.")
              with open(f"{dir}/README.md", 'w', encoding='utf-8') as f:
                  f.write(f"# {artist}\n\n❌ No results found.")
              exit()
          
          print(f"✅ Found {len(tracks)} tracks\n")
          
          all_links = []
          for i, t in enumerate(tracks[:limit]):
              title = t.get('title', 'Unknown')
              track_artist = t.get('uploader', t.get('artist', t.get('channel', artist)))
              duration = t.get('duration', 0) or 0
              mins = int(duration // 60)
              secs = int(duration % 60)
              duration_str = f"{mins}:{secs:02d}"
              url = t.get('webpage_url', t.get('url', ''))
              thumbnail = t.get('thumbnail', t.get('thumbnails', [{}])[0].get('url', '') if t.get('thumbnails') else '')
              
              track_info = {
                  'index': i + 1,
                  'title': title,
                  'artist': track_artist,
                  'duration': duration_str,
                  'url': url,
                  'thumbnail': thumbnail
              }
              all_links.append(track_info)
              print(f"{i+1}. {track_artist} — {title}  [{duration_str}]")
              print(f"   🔗 {url}\n")
          
          # README.md
          md = f"<div align=\"center\">\n\n# 🎵 {artist}\n\n**{len(all_links)} tracks**\n\n</div>\n\n"
          md += "<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Link</th></tr>\n"
          links_txt = f"# {artist} — Links\n\n"
          json_tracks = []
          
          for t in all_links:
              cover_html = f"<img src=\"{t['thumbnail']}\" width=\"80\" height=\"80\" style=\"border-radius:8px\">" if t.get('thumbnail') else "🎵"
              md += f"<tr><td align=\"center\">{t['index']}</td><td align=\"center\">{cover_html}</td><td><strong>{t['artist']} — {t['title']}</strong></td><td align=\"center\"><code>{t['duration']}</code></td><td align=\"center\"><a href=\"{t['url']}\" target=\"_blank\">🔗 Open</a></td></tr>\n"
              links_txt += f"{t['url']}\n"
              json_tracks.append(t)
          
          md += "</table>\n\n---\n\n## 📋 All Links\n\n"
          for t in all_links:
              md += f"- **{t['index']}.** [{t['artist']} — {t['title']}]({t['url']}) `{t['duration']}`\n"
          
          with open(f"{dir}/README.md", 'w', encoding='utf-8') as f: f.write(md)
          with open(f"{dir}/links.txt", 'w', encoding='utf-8') as f: f.write(links_txt)
          with open(f"{dir}/links.json", 'w', encoding='utf-8') as f:
              json.dump({'artist': artist, 'query': query, 'total': len(all_links), 'tracks': json_tracks}, f, indent=2)
          
          print(f"✅ Files saved to {dir}/")
          PYEOF

      - name: Show links
        run: cat results/${{ github.event.inputs.artist }}/links.txt 2>/dev/null || echo "No results"

      - name: Commit
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🎧 ${{ github.event.inputs.artist }}" && git push
