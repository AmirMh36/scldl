# .github/workflows/soundcloud-search.yml
name: SoundCloud Search & Extract Links

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name to search'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        default: ''
        type: string
      limit:
        description: 'Number of results'
        required: false
        default: '10'
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          sudo apt-get update -qq
          pip3 install yt-dlp
          echo "✅ Ready"

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p search-results
          
          QUERY="$ARTIST $SONG"
          
          echo "🔍 Searching: $QUERY"
          echo ""
          
          # yt-dlp flat search (no download, just metadata)
          yt-dlp \
            --flat-playlist \
            --dump-json \
            --no-download \
            --no-check-certificate \
            --default-search "scsearch" \
            --max-downloads "$LIMIT" \
            "$QUERY" > search-results/raw.json 2>&1
          
          # Parse results
          python3 << 'PYEOF'
          import json, os

          input_file = 'search-results/raw.json'
          if not os.path.exists(input_file):
              print("No results file")
              exit()

          with open(input_file) as f:
              content = f.read()

          tracks = []
          for line in content.split('\n'):
              if line.startswith('{'):
                  try:
                      track = json.loads(line)
                      tracks.append(track)
                  except:
                      pass

          if not tracks:
              print("❌ No tracks found")
              with open('search-results/links.txt', 'w') as f:
                  f.write('No results found')
              exit()

          print(f"✅ Found {len(tracks)} tracks:\n")

          links = {}
          all_links = []

          for i, t in enumerate(tracks):
              artist = t.get('uploader', t.get('artist', 'Unknown'))
              title = t.get('title', 'Unknown')
              url = t.get('webpage_url', t.get('url', ''))
              duration = t.get('duration', 0) or 0
              
              track_info = {
                  'index': i + 1,
                  'artist': artist,
                  'title': title,
                  'url': url,
                  'duration_seconds': int(duration),
                  'plays': t.get('view_count', 0) or 0,
                  'description': (t.get('description', '') or '')[:200]
              }
              
              all_links.append(track_info)
              
              if artist not in links:
                  links[artist] = []
              links[artist].append(track_info)
              
              mins = int(duration // 60)
              secs = int(duration % 60)
              print(f"{i+1}. {artist} - {title}")
              print(f"   ⏱ {mins}:{secs:02d} | 🔗 {url}\n")

          # Save JSON
          output = {
              'query': f"{os.environ.get('ARTIST', '')} {os.environ.get('SONG', '')}".strip(),
              'date': __import__('datetime').datetime.now().isoformat(),
              'total': len(tracks),
              'links_by_artist': links,
              'all_links': all_links
          }
          
          with open('search-results/links.json', 'w') as f:
              json.dump(output, f, indent=2)

          # Save URLs only
          with open('search-results/links.txt', 'w') as f:
              f.write(f"# SoundCloud Search: {output['query']}\n")
              f.write(f"# Date: {output['date']}\n\n")
              for artist_name, tracks_list in links.items():
                  f.write(f"## {artist_name}\n")
                  for t in tracks_list:
                      f.write(f"{t['url']}\n")
                  f.write('\n')

          print("✅ Saved to search-results/")
          PYEOF

      - name: Show links
        run: |
          if [ -f search-results/links.txt ]; then
            cat search-results/links.txt
          fi

      - name: Commit
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add search-results/
          git diff --staged --quiet || git commit -m "🔍 $ARTIST" && git push
        env:
          ARTIST: ${{ github.event.inputs.artist }}
