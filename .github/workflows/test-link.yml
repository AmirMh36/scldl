name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results (1-50)'
        required: false
        type: string
        default: '20'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          // Generate random si
          const randomSi = () => Array.from({length: 32}, () => Math.floor(Math.random() * 16).toString(16)).join('');

          (async () => {
            const artist = process.env.ARTIST.trim();
            const song = process.env.SONG.trim();
            const limit = Math.min(parseInt(process.env.LIMIT) || 20, 50);
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🎵 SoundCloud Search: "${query}"`);
            console.log(`🎯 Target: ${limit} tracks\n`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            
            // Search tracks
            const searchUrl = `https://soundcloud.com/search/tracks?q=${encodeURIComponent(query)}`;
            console.log(`🔗 ${searchUrl}\n`);
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(3000);
            
            // Scroll to load more
            console.log('📜 Loading tracks...');
            let lastHeight = 0;
            for (let i = 0; i < 15; i++) {
              const newHeight = await page.evaluate(() => {
                window.scrollTo(0, document.body.scrollHeight);
                return document.body.scrollHeight;
              });
              if (newHeight === lastHeight) break;
              lastHeight = newHeight;
              await sleep(1500);
            }
            
            // Extract tracks directly from search results
            console.log('\n🔍 Extracting tracks...\n');
            
            const tracks = await page.evaluate(() => {
              const results = [];
              const items = document.querySelectorAll('li.searchList__item');
              
              items.forEach((item) => {
                try {
                  // Title
                  const titleEl = item.querySelector('a[class*="soundTitle__title"]');
                  // Artist  
                  const artistEl = item.querySelector('a[class*="soundTitle__username"]');
                  // Link
                  const linkEl = item.querySelector('a[href^="/"][href*="/"]');
                  // Thumbnail
                  const imgEl = item.querySelector('img');
                  // Duration
                  const durEl = item.querySelector('span[class*="duration"], .sc-visuallyhidden');
                  
                  const title = titleEl ? titleEl.textContent.trim() : '';
                  const trackArtist = artistEl ? artistEl.textContent.trim() : '';
                  const href = linkEl ? linkEl.getAttribute('href') : '';
                  const thumbnail = imgEl ? imgEl.getAttribute('src') : '';
                  const duration = durEl ? durEl.textContent.trim() : '';
                  
                  if (title && href && href.split('/').length >= 2) {
                    results.push({
                      title,
                      artist: trackArtist,
                      url: `https://soundcloud.com${href.split('?')[0]}`,
                      thumbnail: thumbnail.replace(/t\d+x\d+/, 't500x500'),
                      duration
                    });
                  }
                } catch(e) {}
              });
              
              return results;
            });
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found');
              fs.mkdirSync(`results/${artist}`, { recursive: true });
              fs.writeFileSync(`results/${artist}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }
            
            // Deduplicate and add share URLs
            const unique = [];
            const seen = new Set();
            for (const t of tracks) {
              const key = t.url.toLowerCase();
              if (!seen.has(key)) {
                seen.add(key);
                // Add share URL with random si
                t.shareUrl = `${t.url}?si=${randomSi()}&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing`;
                unique.push(t);
              }
            }
            
            const finalTracks = unique.slice(0, limit);
            finalTracks.forEach((t, i) => t.index = i + 1);
            
            console.log(`✅ ${finalTracks.length} tracks\n`);
            finalTracks.forEach(t => {
              console.log(`${t.index}. ${t.artist} — ${t.title}`);
              console.log(`   🔗 ${t.shareUrl}\n`);
            });
            
            // Save files
            const dir = `results/${artist}`;
            fs.mkdirSync(dir, { recursive: true });
            
            // README.md
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n**${finalTracks.length} tracks**\n\n</div>\n\n`;
            md += '<table>\n';
            md += '<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Share Link</th></tr>\n';
            
            let linksTxt = `# ${artist}\n# Total: ${finalTracks.length} tracks\n\n`;
            
            let jsonTracks = [];
            
            finalTracks.forEach(t => {
              const cover = t.thumbnail
                ? `<img src="${t.thumbnail}" width="80" height="80" style="border-radius:8px">`
                : '🎵';
              
              md += `<tr>\n`;
              md += `<td align="center">${t.index}</td>\n`;
              md += `<td align="center">${cover}</td>\n`;
              md += `<td><strong>${t.artist || artist} — ${t.title}</strong></td>\n`;
              md += `<td align="center"><code>${t.duration || '—'}</code></td>\n`;
              md += `<td align="center"><a href="${t.shareUrl}" target="_blank">🔗 Share</a></td>\n`;
              md += `</tr>\n`;
              
              linksTxt += `${t.shareUrl}\n`;
              
              jsonTracks.push({
                index: t.index,
                artist: t.artist || artist,
                title: t.title,
                shareUrl: t.shareUrl,
                duration: t.duration,
                thumbnail: t.thumbnail
              });
            });
            
            md += '</table>\n\n---\n\n## 📋 Share Links\n\n';
            jsonTracks.forEach(t => {
              md += `- [**${t.artist} — ${t.title}**](${t.shareUrl}) \`${t.duration}\`\n`;
            });
            
            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, linksTxt);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({ artist, query, total: finalTracks.length, date: new Date().toISOString(), tracks: jsonTracks }, null, 2));
            
            console.log(`✅ Saved to ${dir}/`);

          })();
          SCRIPT
          
          node search.js

      - name: Show links
        run: cat results/${{ github.event.inputs.artist }}/links.txt 2>/dev/null || echo "No results"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
