# .github/workflows/soundcloud-search.yml
name: SoundCloud Search & Download

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        type: string
      limit:
        description: 'Number of results'
        required: false
        default: '5'
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js and FFmpeg
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          npm install btch-downloader
          echo "✅ Ready"

      - name: Search SoundCloud
        env:
          QUERY: ${{ github.event.inputs.query }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p search-results
          
          cat > search.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');

          const query = process.env.QUERY;
          const limit = parseInt(process.env.LIMIT) || 5;
          const clientId = 'a3e059563d7fd3372b49b37f00a00bcf';

          const searchUrl = `https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${clientId}&limit=${limit}`;

          console.log('🔍 Searching SoundCloud...');
          console.log(`Query: "${query}"`);
          console.log('');

          https.get(searchUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              try {
                const json = JSON.parse(data);
                const tracks = json.collection || [];

                if (tracks.length === 0) {
                  console.log('❌ No results found');
                  process.exit(0);
                }

                console.log(`📊 Found ${tracks.length} results:\n`);

                const results = tracks.map((track, i) => {
                  const title = track.title || 'Unknown';
                  const artist = track.user?.username || 'Unknown';
                  const url = track.permalink_url || '';
                  const duration = Math.floor((track.duration || 0) / 1000);
                  const mins = Math.floor(duration / 60);
                  const secs = duration % 60;
                  const plays = (track.playback_count || 0).toLocaleString();
                  const genre = track.genre || 'N/A';

                  console.log(`${i + 1}. ${artist} - ${title}`);
                  console.log(`   ⏱ ${mins}:${secs.toString().padStart(2,'0')} | ▶ ${plays} plays | 🏷 ${genre}`);
                  console.log(`   🔗 ${url}`);
                  console.log('');

                  return {
                    index: i + 1,
                    title,
                    artist,
                    url,
                    duration: `${mins}:${secs.toString().padStart(2,'0')}`,
                    plays,
                    genre,
                    artwork: track.artwork_url || track.user?.avatar_url || ''
                  };
                });

                // Save results
                const output = {
                  query,
                  date: new Date().toISOString(),
                  total: tracks.length,
                  results
                };

                fs.writeFileSync('search-results/search.json', JSON.stringify(output, null, 2));
                console.log('✅ Results saved to search-results/search.json');

                // Also save as readable text
                let text = `SoundCloud Search: "${query}"\n`;
                text += '='.repeat(50) + '\n\n';
                results.forEach(r => {
                  text += `${r.index}. ${r.artist} - ${r.title}\n`;
                  text += `   Duration: ${r.duration} | Plays: ${r.plays}\n`;
                  text += `   URL: ${r.url}\n\n`;
                });
                fs.writeFileSync('search-results/search.txt', text);

              } catch (err) {
                console.error('❌ Parse error:', err.message);
                console.log('Raw response:', data.substring(0, 500));
              }
            });
          }).on('error', (err) => {
            console.error('❌ Request error:', err.message);
          });
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          if [ -f search-results/search.txt ]; then
            echo "📋 Search Results:"
            cat search-results/search.txt
          fi

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add search-results/
          
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🔍 Search: ${{ github.event.inputs.query }}"
            git push
            echo "✅ Results committed!"
          fi
