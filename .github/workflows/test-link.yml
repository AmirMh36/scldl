name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results (1-50)'
        required: false
        type: string
        default: '20'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          // Build share URL with UTM params
          function toShareUrl(url) {
            // Remove any existing query params
            const baseUrl = url.split('?')[0];
            return `${baseUrl}?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing`;
          }

          (async () => {
            const artist = process.env.ARTIST.trim();
            const song = process.env.SONG.trim();
            const limit = Math.min(parseInt(process.env.LIMIT) || 20, 50);
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🔍 Searching: "${query}"`);
            console.log(`🎯 Target: ${limit} share links\n`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            
            // Step 1: Find artist profile
            const searchUrl = `https://soundcloud.com/search/people?q=${encodeURIComponent(artist)}`;
            console.log('Finding artist profile...');
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(2000);
            
            let artistUrl = await page.evaluate((name) => {
              const links = document.querySelectorAll('a[href*="/"]');
              for (const link of links) {
                const href = link.getAttribute('href');
                const text = link.textContent.trim().toLowerCase();
                if (href && text === name.toLowerCase() && href.split('/').length === 2) {
                  return `https://soundcloud.com${href}`;
                }
              }
              return null;
            }, artist);
            
            if (artistUrl) {
              console.log(`✅ Profile: ${artistUrl}`);
              // Force popular tracks page
              const urlParts = artistUrl.split('/');
              const username = urlParts[urlParts.length - 1] || urlParts[urlParts.length - 2];
              artistUrl = `https://soundcloud.com/${username}/popular-tracks`;
            } else {
              console.log('⚠️ Profile not found, using search');
              artistUrl = `https://soundcloud.com/search/tracks?q=${encodeURIComponent(query)}`;
            }
            
            console.log(`URL: ${artistUrl}\n`);
            
            // Step 2: Load all tracks
            await page.goto(artistUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(3000);
            
            // Scroll to load more
            console.log('Loading all tracks...');
            let lastHeight = 0;
            for (let i = 0; i < 15; i++) {
              const newHeight = await page.evaluate(() => {
                window.scrollTo(0, document.body.scrollHeight);
                return document.body.scrollHeight;
              });
              if (newHeight === lastHeight) break;
              lastHeight = newHeight;
              await sleep(1500);
              process.stdout.write(`  Scroll ${i + 1} - ${newHeight}px\r`);
            }
            
            // Step 3: Click "Share" button on each track and get URL
            console.log('\n\nExtracting share links...\n');
            
            const tracks = await page.evaluate(() => {
              const results = [];
              
              // Get all track items
              const items = document.querySelectorAll(
                'li.soundList__item, article.audible, li[class*="track"], div.sound__body'
              );
              
              items.forEach((item) => {
                try {
                  // Title
                  const titleEl = item.querySelector(
                    'a[class*="soundTitle__title"], a[class*="title"], span[class*="title"]'
                  );
                  
                  // Artist
                  const artistEl = item.querySelector(
                    'a[class*="soundTitle__username"], a[class*="owner"], span[class*="username"]'
                  );
                  
                  // Thumbnail
                  const imgEl = item.querySelector('img[src*="sndcdn.com"]');
                  
                  // Duration
                  const durEl = item.querySelector(
                    'span[class*="duration"], div[class*="duration"], .sc-visuallyhidden'
                  );
                  
                  // Any link with track path
                  const linkEl = item.querySelector('a[href^="/"][href*="/"]');
                  
                  const title = titleEl ? titleEl.textContent.trim() : '';
                  const trackArtist = artistEl ? artistEl.textContent.trim() : '';
                  const href = linkEl ? linkEl.getAttribute('href') : '';
                  
                  if (title && href && href.includes('/') && href.split('/').length >= 2) {
                    results.push({
                      title,
                      artist: trackArtist,
                      url: `https://soundcloud.com${href.split('?')[0]}`,
                      thumbnail: imgEl ? imgEl.getAttribute('src') : '',
                      duration: durEl ? durEl.textContent.trim() : ''
                    });
                  }
                } catch(e) {}
              });
              
              return results;
            });
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found');
              fs.mkdirSync(`results/${artist}`, { recursive: true });
              fs.writeFileSync(`results/${artist}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }
            
            // Deduplicate
            const unique = [];
            const seen = new Set();
            for (const t of tracks) {
              const key = t.url.toLowerCase();
              if (!seen.has(key)) {
                seen.add(key);
                unique.push(t);
              }
            }
            
            const finalTracks = unique.slice(0, limit);
            
            // Add share URLs
            finalTracks.forEach(t => {
              t.shareUrl = toShareUrl(t.url);
            });
            
            console.log(`✅ ${finalTracks.length} unique tracks\n`);
            
            // Print tracks
            finalTracks.forEach((t, i) => {
              t.index = i + 1;
              console.log(`${t.index}. ${t.artist || artist} — ${t.title}`);
              console.log(`   ⏱ ${t.duration || '—'}`);
              console.log(`   🔗 ${t.shareUrl}\n`);
            });
            
            // Save files
            const dir = `results/${artist}`;
            fs.mkdirSync(dir, { recursive: true });
            
            // README.md
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n`;
            md += `**${finalTracks.length} tracks**\n\n`;
            md += `</div>\n\n`;
            md += '<table>\n';
            md += '<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Share Link</th></tr>\n';
            
            // links.txt (share URLs)
            let linksTxt = `# ${artist} — SoundCloud Share Links\n`;
            linksTxt += `# Total: ${finalTracks.length} tracks\n`;
            linksTxt += `# Generated: ${new Date().toISOString()}\n\n`;
            
            // JSON data
            let jsonTracks = [];
            
            finalTracks.forEach((t) => {
              const cover = t.thumbnail
                ? `<img src="${t.thumbnail}" width="60" height="60" style="border-radius:6px">`
                : '—';
              
              md += `<tr>\n`;
              md += `<td align="center">${t.index}</td>\n`;
              md += `<td align="center">${cover}</td>\n`;
              md += `<td><strong>${t.artist || artist} — ${t.title}</strong></td>\n`;
              md += `<td align="center"><code>${t.duration || '—'}</code></td>\n`;
              md += `<td align="center"><a href="${t.shareUrl}" target="_blank">🔗 Share</a></td>\n`;
              md += `</tr>\n`;
              
              linksTxt += `${t.index}. ${t.artist || artist} — ${t.title}\n`;
              linksTxt += `${t.shareUrl}\n\n`;
              
              jsonTracks.push({
                index: t.index,
                artist: t.artist || artist,
                title: t.title,
                url: t.url,
                shareUrl: t.shareUrl,
                duration: t.duration,
                thumbnail: t.thumbnail
              });
            });
            
            md += '</table>\n\n';
            md += '---\n\n';
            md += '## 📋 All Share Links\n\n';
            jsonTracks.forEach(t => {
              md += `**${t.index}.** [${t.artist} — ${t.title}](${t.shareUrl}) \`${t.duration}\`\n\n`;
            });
            
            md += `---\n\n*Generated: ${new Date().toISOString()}*`;
            
            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, linksTxt);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({
              artist,
              query,
              total: finalTracks.length,
              date: new Date().toISOString(),
              tracks: jsonTracks
            }, null, 2));
            
            console.log(`\n✅ Saved:`);
            console.log(`   📄 ${dir}/README.md`);
            console.log(`   📄 ${dir}/links.txt`);
            console.log(`   📄 ${dir}/links.json`);

          })();
          SCRIPT
          
          node search.js

      - name: Show links
        run: |
          ARTIST="${{ github.event.inputs.artist }}"
          echo ""
          echo "📋 Share Links:"
          echo "==============="
          cat "results/$ARTIST/links.txt" 2>/dev/null || echo "No results"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
