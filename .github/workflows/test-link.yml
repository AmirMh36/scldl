name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results'
        required: false
        type: string
        default: '5'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            const artist = process.env.ARTIST;
            const song = process.env.SONG;
            const limit = parseInt(process.env.LIMIT) || 5;
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🔍 Searching SoundCloud for: "${query}"`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });
            
            // Go to SoundCloud search
            const searchUrl = `https://soundcloud.com/search?q=${encodeURIComponent(query)}`;
            console.log(`URL: ${searchUrl}`);
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            
            // Wait for results
            await page.waitForTimeout(3000);
            
            // Extract tracks
            const tracks = await page.evaluate(() => {
              const results = [];
              const items = document.querySelectorAll('li.searchList__item');
              
              items.forEach((item, i) => {
                try {
                  const link = item.querySelector('a.soundTitle__title');
                  const artistEl = item.querySelector('a.soundTitle__username');
                  const img = item.querySelector('img');
                  const durationEl = item.querySelector('.sc-visuallyhidden');
                  
                  if (link && artistEl) {
                    results.push({
                      title: link.textContent.trim(),
                      artist: artistEl.textContent.trim(),
                      url: 'https://soundcloud.com' + link.getAttribute('href'),
                      thumbnail: img ? img.getAttribute('src') : '',
                      index: i + 1
                    });
                  }
                } catch(e) {}
              });
              
              return results.slice(0, 10);
            });
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found');
              fs.mkdirSync(`results/${artist}`, { recursive: true });
              fs.writeFileSync(`results/${artist}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }
            
            console.log(`\n✅ Found ${tracks.length} tracks:\n`);
            
            // Save results
            fs.mkdirSync(`results/${artist}`, { recursive: true });
            
            // README.md
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n**${tracks.length} tracks found**\n\n</div>\n\n`;
            md += '<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Link</th></tr>\n';
            
            let links_txt = `# ${artist} - SoundCloud Links\n\n`;
            let json_data = [];
            
            tracks.forEach((t) => {
              const cover = t.thumbnail ? `<img src="${t.thumbnail}" width="60" height="60" style="border-radius:6px">` : '—';
              md += `<tr>\n<td>${t.index}</td>\n<td>${cover}</td>\n<td><strong>${t.artist} - ${t.title}</strong></td>\n<td><a href="${t.url}">🔗 Listen</a></td>\n</tr>\n`;
              
              links_txt += `${t.url}\n`;
              json_data.push(t);
              
              console.log(`${t.index}. ${t.artist} - ${t.title}`);
              console.log(`   🔗 ${t.url}\n`);
            });
            
            md += '</table>\n\n---\n\n## 📋 Direct Links\n\n';
            json_data.forEach(t => {
              md += `- [${t.artist} - ${t.title}](${t.url})\n`;
            });
            
            fs.writeFileSync(`results/${artist}/README.md`, md);
            fs.writeFileSync(`results/${artist}/links.txt`, links_txt);
            fs.writeFileSync(`results/${artist}/links.json`, JSON.stringify({
              artist, query, total: tracks.length,
              date: new Date().toISOString(),
              tracks: json_data
            }, null, 2));
            
            console.log(`✅ Saved to results/${artist}/`);
          })();
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          cat results/$ARTIST/links.txt 2>/dev/null || echo "No results"
        env:
          ARTIST: ${{ github.event.inputs.artist }}

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
