name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results'
        required: false
        type: string
        default: '5'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            const artist = process.env.ARTIST;
            const song = process.env.SONG;
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🔍 Searching SoundCloud for: "${query}"`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });
            
            const searchUrl = `https://soundcloud.com/search?q=${encodeURIComponent(query)}`;
            console.log(`URL: ${searchUrl}`);
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            
            // Wait for results to load
            await sleep(3000);
            
            // Try to click "Tracks" filter if available
            try {
              await page.click('a[href*="search/tracks"]');
              await sleep(2000);
            } catch(e) {
              console.log('No tracks filter tab');
            }
            
            // Extract tracks
            const tracks = await page.evaluate(() => {
              const results = [];
              // Try multiple selectors
              const items = document.querySelectorAll(
                'li.searchList__item, div[class*="searchItem"], div[class*="track"]'
              );
              
              items.forEach((item, i) => {
                try {
                  const link = item.querySelector('a[href*="/"]');
                  const artistEl = item.querySelector(
                    'a[class*="username"], span[class*="username"], a[class*="artist"]'
                  );
                  const titleEl = item.querySelector(
                    'a[class*="title"], span[class*="title"], a[class*="soundTitle"]'
                  );
                  const img = item.querySelector('img');
                  
                  const url = link ? link.getAttribute('href') : '';
                  const title = titleEl ? titleEl.textContent.trim() : '';
                  const trackArtist = artistEl ? artistEl.textContent.trim() : artist;
                  
                  if (url && url.includes('/') && title) {
                    const fullUrl = url.startsWith('http') ? url : `https://soundcloud.com${url}`;
                    results.push({
                      title: title,
                      artist: trackArtist,
                      url: fullUrl,
                      thumbnail: img ? img.getAttribute('src') : '',
                      index: i + 1
                    });
                  }
                } catch(e) {}
              });
              
              return results.slice(0, 10);
            });
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found');
              fs.mkdirSync(`results/${artist}`, { recursive: true });
              fs.writeFileSync(`results/${artist}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }
            
            // Remove duplicates
            const unique = [];
            const seen = new Set();
            for (const t of tracks) {
              const key = t.url;
              if (!seen.has(key)) {
                seen.add(key);
                unique.push(t);
              }
            }
            
            const finalTracks = unique.slice(0, parseInt(process.env.LIMIT) || 5);
            
            console.log(`\n✅ Found ${finalTracks.length} tracks:\n`);
            
            // Save results
            fs.mkdirSync(`results/${artist}`, { recursive: true });
            
            // README.md with cover art
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n`;
            md += `**${finalTracks.length} tracks found**\n\n`;
            md += `</div>\n\n`;
            md += '<table>\n';
            md += '<tr><th>#</th><th>Cover</th><th>Track</th><th>Link</th></tr>\n';
            
            let links = '';
            let jsonTracks = [];
            
            finalTracks.forEach((t, i) => {
              t.index = i + 1;
              
              const cover = t.thumbnail 
                ? `<img src="${t.thumbnail}" width="60" height="60" style="border-radius:6px">` 
                : '—';
              
              md += `<tr>\n`;
              md += `<td>${t.index}</td>\n`;
              md += `<td>${cover}</td>\n`;
              md += `<td><strong>${t.artist} — ${t.title}</strong></td>\n`;
              md += `<td><a href="${t.url}" target="_blank">🔗 Listen</a></td>\n`;
              md += `</tr>\n`;
              
              links += `${t.url}\n`;
              jsonTracks.push(t);
              
              console.log(`${t.index}. ${t.artist} - ${t.title}`);
              console.log(`   🔗 ${t.url}\n`);
            });
            
            md += '</table>\n\n---\n\n';
            md += '## 📋 Direct Links\n\n';
            jsonTracks.forEach(t => {
              md += `- [${t.artist} — ${t.title}](${t.url})\n`;
            });
            
            md += `\n---\n\n*Generated: ${new Date().toISOString()}*`;
            
            // Write files
            const dir = `results/${artist}`;
            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, links);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({
              artist,
              query,
              total: finalTracks.length,
              date: new Date().toISOString(),
              tracks: jsonTracks
            }, null, 2));
            
            console.log(`✅ Files saved:\n`);
            console.log(`   📄 ${dir}/README.md`);
            console.log(`   📄 ${dir}/links.txt`);
            console.log(`   📄 ${dir}/links.json`);
            
          })();
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          ARTIST="${{ github.event.inputs.artist }}"
          echo ""
          echo "📋 Links:"
          echo "========="
          cat "results/$ARTIST/links.txt" 2>/dev/null || echo "No results found"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
