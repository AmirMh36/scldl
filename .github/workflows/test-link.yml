name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results (1-50)'
        required: false
        type: string
        default: '20'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          (async () => {
            const artist = process.env.ARTIST.trim();
            const song = process.env.SONG.trim();
            const limit = Math.min(parseInt(process.env.LIMIT) || 20, 50);
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🎵 SoundCloud Search: "${query}"`);
            console.log(`🎯 Target: ${limit} tracks\n`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            
            // Search directly for tracks
            const searchUrl = `https://soundcloud.com/search/tracks?q=${encodeURIComponent(query)}`;
            console.log(`🔗 ${searchUrl}\n`);
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            await sleep(3000);
            
            // Scroll to load more
            console.log('📜 Loading more tracks...');
            let lastHeight = 0;
            for (let i = 0; i < 15; i++) {
              const newHeight = await page.evaluate(() => {
                window.scrollTo(0, document.body.scrollHeight);
                return document.body.scrollHeight;
              });
              if (newHeight === lastHeight) break;
              lastHeight = newHeight;
              await sleep(2000);
            }
            
            // Extract track info and get share links
            console.log('\n🔍 Getting share links...\n');
            
            const tracks = [];
            const items = await page.$$('li.searchList__item, article.audible, li[class*="trackList"]');
            
            for (const item of items.slice(0, limit)) {
              try {
                // Get basic info
                const titleEl = await item.$('a[class*="soundTitle__title"], a[class*="title"]');
                const artistEl = await item.$('a[class*="soundTitle__username"], a[class*="owner"]');
                const imgEl = await item.$('img[src*="sndcdn"]');
                const durEl = await item.$('span[class*="duration"], div[class*="duration"]');
                
                const title = titleEl ? await page.evaluate(el => el.textContent.trim(), titleEl) : '';
                const trackArtist = artistEl ? await page.evaluate(el => el.textContent.trim(), artistEl) : artist;
                const duration = durEl ? await page.evaluate(el => el.textContent.trim(), durEl) : '';
                
                let thumbnail = '';
                if (imgEl) {
                  thumbnail = await page.evaluate(el => el.getAttribute('src'), imgEl);
                  thumbnail = thumbnail.replace(/t\d+x\d+/, 't500x500');
                }
                
                if (!title) continue;
                
                // Click Share button
                let shareUrl = '';
                try {
                  const shareBtn = await item.$('button[class*="share"], button[title*="Share"], a[class*="share"]');
                  if (shareBtn) {
                    await shareBtn.click();
                    await sleep(1000);
                    
                    // Get share input value
                    const shareInput = await page.$('input[class*="shareLink"], input[value*="soundcloud.com"]');
                    if (shareInput) {
                      shareUrl = await page.evaluate(el => el.value, shareInput);
                    }
                    
                    // Close share popup
                    const closeBtn = await page.$('button[class*="close"], button[class*="dismiss"]');
                    if (closeBtn) await closeBtn.click();
                    await sleep(500);
                  }
                } catch(e) {}
                
                // Fallback: build URL from href
                if (!shareUrl) {
                  const linkEl = await item.$('a[href^="/"][href*="/"]');
                  if (linkEl) {
                    const href = await page.evaluate(el => el.getAttribute('href'), linkEl);
                    if (href) {
                      shareUrl = `https://soundcloud.com${href.split('?')[0]}?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing`;
                    }
                  }
                }
                
                if (shareUrl) {
                  tracks.push({
                    title,
                    artist: trackArtist || artist,
                    shareUrl,
                    duration,
                    thumbnail
                  });
                  
                  console.log(`${tracks.length}. ${trackArtist || artist} — ${title}`);
                  console.log(`   ⏱ ${duration || '—'}`);
                  console.log(`   🔗 ${shareUrl}\n`);
                }
                
              } catch(e) {}
            }
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found');
              fs.mkdirSync(`results/${artist}`, { recursive: true });
              fs.writeFileSync(`results/${artist}/README.md`, `# ${artist}\n\n❌ No results found.`);
              process.exit(0);
            }
            
            console.log(`\n✅ ${tracks.length} tracks extracted\n`);
            
            // Save files
            const dir = `results/${artist}`;
            fs.mkdirSync(dir, { recursive: true });
            
            // README.md
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n**${tracks.length} tracks**\n\n</div>\n\n`;
            md += '<table>\n';
            md += '<tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Share Link</th></tr>\n';
            
            let linksTxt = `# ${artist} — SoundCloud Share Links\n`;
            linksTxt += `# Total: ${tracks.length} tracks\n\n`;
            
            let jsonTracks = [];
            
            tracks.forEach((t, i) => {
              t.index = i + 1;
              
              const coverHtml = t.thumbnail
                ? `<img src="${t.thumbnail}" width="80" height="80" style="border-radius:8px">`
                : '<div style="width:80px;height:80px;background:#333;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#666">🎵</div>';
              
              md += `<tr>\n`;
              md += `<td align="center">${t.index}</td>\n`;
              md += `<td align="center">${coverHtml}</td>\n`;
              md += `<td><strong>${t.artist} — ${t.title}</strong></td>\n`;
              md += `<td align="center"><code>${t.duration || '—'}</code></td>\n`;
              md += `<td align="center"><a href="${t.shareUrl}" target="_blank">🔗 Share</a></td>\n`;
              md += `</tr>\n`;
              
              linksTxt += `${t.index}. ${t.artist} — ${t.title}\n${t.shareUrl}\n\n`;
              
              jsonTracks.push({
                index: t.index,
                artist: t.artist,
                title: t.title,
                shareUrl: t.shareUrl,
                duration: t.duration,
                thumbnail: t.thumbnail
              });
            });
            
            md += '</table>\n\n---\n\n## 📋 All Share Links\n\n';
            jsonTracks.forEach(t => {
              md += `**${t.index}.** [${t.artist} — ${t.title}](${t.shareUrl}) \`${t.duration}\`\n\n`;
            });
            md += `\n---\n\n*Generated: ${new Date().toISOString()}*`;
            
            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, linksTxt);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({
              artist, query,
              total: tracks.length,
              date: new Date().toISOString(),
              tracks: jsonTracks
            }, null, 2));
            
            console.log(`✅ Saved to ${dir}/`);

          })();
          SCRIPT
          
          node search.js

      - name: Show links
        run: |
          ARTIST="${{ github.event.inputs.artist }}"
          echo ""
          cat "results/$ARTIST/links.txt" 2>/dev/null || echo "No results"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
