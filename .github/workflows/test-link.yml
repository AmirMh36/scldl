# .github/workflows/soundcloud-search.yml
name: SoundCloud Search & Extract Links

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name to search'
        required: true
        type: string
      song:
        description: 'Song name (optional - leave empty to get all songs)'
        required: false
        default: ''
        type: string
      limit:
        description: 'Number of results'
        required: false
        default: '10'
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Search and extract links
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p search-results
          
          cat > search.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');

          const artist = process.env.ARTIST;
          const song = process.env.SONG;
          const limit = parseInt(process.env.LIMIT) || 10;
          const clientId = 'a3e059563d7fd3372b49b37f00a00bcf';

          // Build search query
          let query = artist;
          if (song) query = `${artist} ${song}`;

          const searchUrl = `https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${clientId}&limit=${limit}`;

          console.log('🔍 Searching SoundCloud...');
          console.log(`Artist: ${artist}`);
          if (song) console.log(`Song: ${song}`);
          console.log(`Limit: ${limit}`);
          console.log('');

          https.get(searchUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const json = JSON.parse(data);
              const tracks = json.collection || [];

              if (tracks.length === 0) {
                console.log('❌ No results found');
                process.exit(0);
              }

              console.log(`📊 Found ${tracks.length} tracks:\n`);

              // Extract links grouped by artist
              const linksByArtist = {};
              const allLinks = [];

              tracks.forEach((track, i) => {
                const trackArtist = track.user?.username || 'Unknown';
                const title = track.title || 'Unknown';
                const url = track.permalink_url || '';
                const duration = Math.floor((track.duration || 0) / 1000);
                const mins = Math.floor(duration / 60);
                const secs = duration % 60;
                const artwork = track.artwork_url || '';
                
                const trackInfo = {
                  index: i + 1,
                  artist: trackArtist,
                  title: title,
                  url: url,
                  duration: `${mins}:${secs.toString().padStart(2, '0')}`,
                  duration_seconds: duration,
                  plays: track.playback_count || 0,
                  likes: track.likes_count || track.favoritings_count || 0,
                  genre: track.genre || 'Unknown',
                  artwork: artwork.replace('large', 't500x500') || '',
                  created_at: track.created_at || '',
                  description: (track.description || '').substring(0, 200)
                };

                allLinks.push(trackInfo);

                // Group by artist
                if (!linksByArtist[trackArtist]) {
                  linksByArtist[trackArtist] = [];
                }
                linksByArtist[trackArtist].push(trackInfo);

                // Print to console
                console.log(`${i + 1}. ${trackArtist} - ${title}`);
                console.log(`   ⏱ ${mins}:${secs.toString().padStart(2, '0')} | ▶ ${(track.playback_count || 0).toLocaleString()} | ❤ ${track.likes_count || 0}`);
                console.log(`   🔗 ${url}`);
                console.log('');
              });

              // Save all links as JSON
              const output = {
                search_query: query,
                artist: artist,
                song: song || 'all',
                date: new Date().toISOString(),
                total_results: tracks.length,
                links_by_artist: linksByArtist,
                all_links: allLinks
              };

              fs.writeFileSync('search-results/links.json', JSON.stringify(output, null, 2));

              // Save just URLs (simple list)
              let urlList = `# SoundCloud Links for "${query}"\n`;
              urlList += `# Generated: ${new Date().toISOString()}\n\n`;

              Object.keys(linksByArtist).forEach(artistName => {
                urlList += `## ${artistName}\n`;
                linksByArtist[artistName].forEach(track => {
                  urlList += `${track.url}\n`;
                });
                urlList += '\n';
              });

              fs.writeFileSync('search-results/links.txt', urlList);

              // Save summary
              let summary = `🎵 SoundCloud Search Results\n`;
              summary += '='.repeat(50) + '\n\n';
              summary += `Query: "${query}"\n`;
              summary += `Date: ${new Date().toLocaleString()}\n`;
              summary += `Total: ${tracks.length} tracks\n\n`;

              Object.keys(linksByArtist).forEach(artistName => {
                summary += `📌 ${artistName} (${linksByArtist[artistName].length} tracks):\n`;
                linksByArtist[artistName].forEach(track => {
                  summary += `   ${track.title}: ${track.url}\n`;
                });
                summary += '\n';
              });

              fs.writeFileSync('search-results/README.md', summary);

              console.log('✅ Files saved:');
              console.log('   - search-results/links.json (full data)');
              console.log('   - search-results/links.txt (just URLs)');
              console.log('   - search-results/README.md (summary)');
            });
          }).on('error', (err) => {
            console.error('❌ Request error:', err.message);
          });
          SCRIPT
          
          node search.js

      - name: Show extracted links
        run: |
          if [ -f search-results/links.txt ]; then
            echo ""
            echo "📋 Extracted Links:"
            echo "===================="
            cat search-results/links.txt
          fi

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add search-results/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔍 Search: ${{ github.event.inputs.artist }}${{ github.event.inputs.song && ' - ' || '' }}${{ github.event.inputs.song }}"
            git push
            echo "✅ Committed!"
          fi
