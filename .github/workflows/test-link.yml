# .github/workflows/soundcloud-search.yml
name: SoundCloud Search & Extract Links

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name to search'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        default: ''
        type: string
      limit:
        description: 'Number of results'
        required: false
        default: '10'
        type: string

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Search and extract links
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p search-results
          
          cat > search.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');

          const artist = process.env.ARTIST.trim();
          const song = process.env.SONG.trim();
          const limit = parseInt(process.env.LIMIT) || 10;

          // Fix: encode query properly, use + for spaces
          let query = artist;
          if (song) query = `${artist} ${song}`;
          const encodedQuery = encodeURIComponent(query);

          const clientId = 'a3e059563d7fd3372b49b37f00a00bcf';
          const searchUrl = `https://api-v2.soundcloud.com/search/tracks?q=${encodedQuery}&client_id=${clientId}&limit=${limit}&offset=0`;

          console.log('🔍 Searching SoundCloud...');
          console.log(`Query: "${query}"`);
          console.log(`URL: ${searchUrl}`);
          console.log('');

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { 
                headers: { 
                  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36',
                  'Accept': 'application/json'
                } 
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`  Status: ${res.statusCode}`);
                  console.log(`  Size: ${data.length} bytes`);
                  
                  if (res.statusCode !== 200) {
                    console.error(`  Response: ${data.substring(0, 300)}`);
                    reject(new Error(`HTTP ${res.statusCode}`));
                    return;
                  }
                  
                  try {
                    resolve(JSON.parse(data));
                  } catch(e) {
                    console.error(`  Parse error. Raw: ${data.substring(0, 500)}`);
                    resolve({ collection: [] });
                  }
                });
              }).on('error', (err) => {
                reject(err);
              });
            });
          }

          async function search() {
            try {
              console.log('Fetching...');
              const json = await fetchUrl(searchUrl);
              const tracks = json.collection || [];

              if (tracks.length === 0) {
                console.log('\n❌ No results found');
                
                // Save empty result
                fs.writeFileSync('search-results/links.json', JSON.stringify({
                  query, artist, song, total_results: 0, links_by_artist: {}, all_links: []
                }, null, 2));
                fs.writeFileSync('search-results/links.txt', `No results for "${query}"`);
                process.exit(0);
              }

              console.log(`\n✅ Found ${tracks.length} tracks!\n`);

              const linksByArtist = {};
              const allLinks = [];

              tracks.forEach((track, i) => {
                const trackArtist = track.user?.username || 'Unknown';
                const title = track.title || 'Unknown';
                const url = track.permalink_url || '';

                const trackInfo = {
                  index: i + 1,
                  artist: trackArtist,
                  title: title,
                  url: url,
                  duration_seconds: Math.floor((track.duration || 0) / 1000),
                  plays: track.playback_count || 0,
                  likes: track.likes_count || track.favoritings_count || 0,
                  genre: track.genre || 'Unknown',
                  artwork: (track.artwork_url || '').replace('large', 't500x500'),
                  created_at: track.created_at || ''
                };

                allLinks.push(trackInfo);

                if (!linksByArtist[trackArtist]) {
                  linksByArtist[trackArtist] = [];
                }
                linksByArtist[trackArtist].push(trackInfo);

                const mins = Math.floor(trackInfo.duration_seconds / 60);
                const secs = trackInfo.duration_seconds % 60;
                console.log(`${i + 1}. ${trackArtist} - ${title}`);
                console.log(`   ⏱ ${mins}:${secs.toString().padStart(2, '0')} | ▶ ${(trackInfo.plays).toLocaleString()}`);
                console.log(`   🔗 ${url}\n`);
              });

              // Save JSON
              fs.writeFileSync('search-results/links.json', JSON.stringify({
                search_query: query,
                artist, song: song || 'all',
                date: new Date().toISOString(),
                total_results: tracks.length,
                links_by_artist: linksByArtist,
                all_links: allLinks
              }, null, 2));

              // Save URLs only
              let urlList = `# SoundCloud Links for "${query}"\n`;
              urlList += `# Generated: ${new Date().toISOString()}\n\n`;
              for (const [artistName, tracks] of Object.entries(linksByArtist)) {
                urlList += `## ${artistName} (${tracks.length} tracks)\n`;
                tracks.forEach(t => { urlList += `${t.url}\n`; });
                urlList += '\n';
              }
              fs.writeFileSync('search-results/links.txt', urlList);

              // Save Markdown summary
              let md = `# 🎵 Search: "${query}"\n\n`;
              md += `**Date:** ${new Date().toLocaleString()}\n`;
              md += `**Total:** ${tracks.length} tracks\n\n`;
              md += '---\n\n';
              for (const [artistName, tracks] of Object.entries(linksByArtist)) {
                md += `## ${artistName}\n\n`;
                md += '| # | Title | Duration | Plays |\n';
                md += '|---|-------|----------|-------|\n';
                tracks.forEach(t => {
                  const m = Math.floor(t.duration_seconds / 60);
                  const s = t.duration_seconds % 60;
                  md += `| ${t.index} | [${t.title}](${t.url}) | ${m}:${s.toString().padStart(2,'0')} | ${t.plays.toLocaleString()} |\n`;
                });
                md += '\n';
              }
              fs.writeFileSync('search-results/README.md', md);

              console.log('✅ Files saved!');

            } catch(err) {
              console.error('❌ Error:', err.message);
              fs.writeFileSync('search-results/error.txt', err.message);
              process.exit(1);
            }
          }

          search();
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          echo ""
          if [ -f search-results/links.txt ]; then
            cat search-results/links.txt
          elif [ -f search-results/error.txt ]; then
            echo "Error: $(cat search-results/error.txt)"
          fi

      - name: Commit results
        if: always()
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          git add search-results/
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "🔍 ${{ github.event.inputs.artist }}${{ github.event.inputs.song && format(' - {0}', github.event.inputs.song) || '' }}"
            git push
            echo "✅ Committed!"
          fi
