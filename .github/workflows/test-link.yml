name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results (1-50)'
        required: false
        type: string
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Search SoundCloud
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          cat > search.js << 'SCRIPT'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
          const randomSi = () => Array.from({length: 32}, () => Math.floor(Math.random() * 16).toString(16)).join('');

          (async () => {
            const artist = process.env.ARTIST.trim();
            const song = process.env.SONG.trim();
            const limit = parseInt(process.env.LIMIT) || 10;
            const query = song ? `${artist} ${song}` : artist;
            
            console.log(`🎵 SoundCloud Search`);
            console.log(`Query: "${query}"`);
            console.log(`Limit: ${limit}\n`);
            
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            
            const searchUrl = `https://soundcloud.com/search/tracks?q=${encodeURIComponent(query)}`;
            console.log(`Opening: ${searchUrl}`);
            
            await page.goto(searchUrl, { waitUntil: 'networkidle2', timeout: 30000 });
            console.log('Page loaded, waiting for results...');
            await sleep(4000);
            
            // Count initial items
            let initialCount = await page.$$eval('li.searchList__item', items => items.length);
            console.log(`Initial tracks on page: ${initialCount}`);
            
            // Scroll
            if (initialCount > 0) {
              for (let i = 0; i < 5; i++) {
                await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
                await sleep(2000);
                let count = await page.$$eval('li.searchList__item', items => items.length);
                process.stdout.write(`Scroll ${i+1}: ${count} tracks\r`);
                if (count >= limit || count === initialCount) break;
                initialCount = count;
              }
            }
            
            // Extract tracks with exact selectors
            console.log('\n\nExtracting tracks...');
            const tracks = await page.evaluate(() => {
              const items = document.querySelectorAll('li.searchList__item');
              const results = [];
              
              items.forEach((item, idx) => {
                try {
                  const titleEl = item.querySelector('a.soundTitle__title, a[class*="soundTitle__title"]');
                  const artistEl = item.querySelector('a.soundTitle__username, a[class*="soundTitle__username"]');
                  const imgEl = item.querySelector('img');
                  const linkEl = item.querySelector('a.soundTitle__title'); // the title link has the correct href
                  
                  const title = titleEl ? titleEl.textContent.trim() : '';
                  const trackArtist = artistEl ? artistEl.textContent.trim() : '';
                  const href = linkEl ? linkEl.getAttribute('href') : '';
                  const thumbnail = imgEl ? imgEl.getAttribute('src') : '';
                  
                  if (title && href) {
                    results.push({
                      title,
                      artist: trackArtist,
                      url: 'https://soundcloud.com' + href.split('?')[0],
                      thumbnail: thumbnail.replace(/t\d+x\d+/, 't500x500')
                    });
                  }
                } catch(e) {}
              });
              
              return results;
            });
            
            console.log(`Extracted ${tracks.length} tracks`);
            
            await browser.close();
            
            if (tracks.length === 0) {
              console.log('❌ No tracks found with selector "li.searchList__item".');
              console.log('Fallback: trying alternative selectors...');
              
              // Fallback: Use the API approach via fetch
              const https = require('https');
              const clientId = 'a3e059563d7fd3372b49b37f00a00bcf';
              const apiUrl = `https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${clientId}&limit=${limit}`;
              
              console.log(`API: ${apiUrl}`);
              
              https.get(apiUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  let json;
                  try { json = JSON.parse(data); } catch(e) { json = {}; }
                  const apiTracks = json.collection || [];
                  console.log(`API returned ${apiTracks.length} tracks`);
                  
                  const results = apiTracks.map(t => ({
                    title: t.title,
                    artist: t.user?.username || artist,
                    url: t.permalink_url,
                    shareUrl: t.permalink_url + '?si=' + randomSi() + '&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing',
                    thumbnail: (t.artwork_url || '').replace('large', 't500x500'),
                    duration: Math.floor(t.duration / 1000)
                  }));
                  
                  saveResults(results, artist, query);
                });
              }).on('error', (err) => {
                console.error('API error:', err.message);
                process.exit(1);
              });
              
              // Wait a bit for API response
              await new Promise(resolve => setTimeout(resolve, 5000));
              process.exit(0);
            }
            
            // Build share URLs
            const finalTracks = tracks.slice(0, limit).map((t, i) => ({
              ...t,
              shareUrl: t.url + '?si=' + randomSi() + '&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing',
              index: i+1
            }));
            
            saveResults(finalTracks, artist, query);
            
          })();
          
          function saveResults(tracks, artist, query) {
            const dir = `results/${artist}`;
            fs.mkdirSync(dir, { recursive: true });
            
            if (tracks.length === 0) {
              fs.writeFileSync(`${dir}/README.md`, `# ${artist}\n\n❌ No results.`);
              fs.writeFileSync(`${dir}/links.txt`, 'No results');
              fs.writeFileSync(`${dir}/links.json`, JSON.stringify({artist, query, total:0}));
              console.log('No tracks to save.');
              return;
            }
            
            // README with covers
            let md = `<div align="center">\n\n# 🎵 ${artist}\n\n**${tracks.length} tracks**\n\n</div>\n\n`;
            md += '<table>\n<tr><th>#</th><th>Cover</th><th>Track</th><th>Share Link</th></tr>\n';
            let linksTxt = `# ${artist}\n\n`;
            let jsonTracks = [];
            
            tracks.forEach(t => {
              const cover = t.thumbnail ? `<img src="${t.thumbnail}" width="80" height="80" style="border-radius:8px">` : '🎵';
              md += `<tr><td align="center">${t.index}</td><td align="center">${cover}</td><td><strong>${t.artist || artist} — ${t.title}</strong></td><td align="center"><a href="${t.shareUrl}" target="_blank">🔗 Share</a></td></tr>\n`;
              linksTxt += `${t.shareUrl}\n`;
              jsonTracks.push(t);
            });
            md += '</table>\n\n---\n\n## 📋 Share Links\n\n';
            jsonTracks.forEach(t => md += `- [${t.artist || artist} — ${t.title}](${t.shareUrl})\n`);
            
            fs.writeFileSync(`${dir}/README.md`, md);
            fs.writeFileSync(`${dir}/links.txt`, linksTxt);
            fs.writeFileSync(`${dir}/links.json`, JSON.stringify({artist, query, total: tracks.length, tracks: jsonTracks}, null, 2));
            console.log(`\n✅ Saved ${tracks.length} tracks to ${dir}/`);
          }
          SCRIPT
          
          node search.js

      - name: Show results
        run: |
          ARTIST="${{ github.event.inputs.artist }}"
          echo "Links file:"
          cat "results/$ARTIST/links.txt" 2>/dev/null || echo "Not found"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
