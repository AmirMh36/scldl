name: SoundCloud Search

on:
  workflow_dispatch:
    inputs:
      artist:
        description: 'Artist name'
        required: true
        type: string
      song:
        description: 'Song name (optional)'
        required: false
        type: string
        default: ''
      limit:
        description: 'Max results'
        required: false
        type: string
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update -qq
          pip3 install yt-dlp

      - name: Search
        env:
          ARTIST: ${{ github.event.inputs.artist }}
          SONG: ${{ github.event.inputs.song }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          mkdir -p "results"
          
          QUERY="${ARTIST} ${SONG}"
          echo "Searching: ${QUERY}"
          
          yt-dlp \
            --dump-json \
            --no-download \
            --default-search "scsearch" \
            --max-downloads "${LIMIT}" \
            "${QUERY}" > results/raw.json 2>/dev/null || true
          
          python3 << 'PYEOF'
          import json, os

          artist = os.environ['ARTIST']
          query = f"{artist} {os.environ.get('SONG', '')}".strip()
          limit = int(os.environ.get('LIMIT', 10))
          
          os.makedirs(f"results/{artist}", exist_ok=True)
          
          tracks = []
          if os.path.exists('results/raw.json'):
              with open('results/raw.json') as f:
                  for line in f:
                      if line.startswith('{'):
                          try:
                              tracks.append(json.loads(line))
                          except:
                              pass

          if not tracks:
              with open(f"results/{artist}/README.md", 'w') as f:
                  f.write(f"# {artist}\n\n❌ No results found.")
              exit()

          # Deduplicate
          seen = set()
          unique_tracks = []
          for t in tracks:
              url = t.get('webpage_url', '')
              if url and url not in seen:
                  seen.add(url)
                  unique_tracks.append(t)
          
          tracks = unique_tracks[:limit]

          # Build README
          md = f"""<div align="center">

          # 🎵 {artist}

          **{len(tracks)} tracks found** | {query}

          </div>

          <table>
          <tr><th>#</th><th>Cover</th><th>Track</th><th>Duration</th><th>Link</th></tr>
          """

          links_txt = f"# {artist} - SoundCloud Links\n\n"
          json_data = []

          for i, t in enumerate(tracks):
              title = t.get('title', 'Unknown')
              url = t.get('webpage_url', '')
              thumb = t.get('thumbnail', '')
              dur = t.get('duration', 0) or 0
              mins = int(dur // 60)
              secs = int(dur % 60)
              duration = f"{mins}:{secs:02d}"
              plays = t.get('view_count', 0) or 0
              
              cover_html = f'<img src="{thumb}" width="60" height="60" style="border-radius:6px">' if thumb else '—'
              
              md += f"""
          <tr>
          <td>{i+1}</td>
          <td>{cover_html}</td>
          <td><strong>{title}</strong></td>
          <td><code>{duration}</code></td>
          <td><a href="{url}">🔗 Listen</a></td>
          </tr>"""
              
              links_txt += f"{url}\n"
              
              json_data.append({
                  'index': i+1,
                  'title': title,
                  'artist': t.get('uploader', artist),
                  'url': url,
                  'duration': duration,
                  'thumbnail': thumb,
                  'plays': plays
              })
              
              print(f"{i+1}. {title} | {duration} | {url}")

          md += "\n</table>\n"
          md += f"\n---\n\n## 📋 Direct Links\n\n"
          for j in json_data:
              md += f"- [{j['title']}]({j['url']}) `{j['duration']}`\n"

          # Save files
          with open(f"results/{artist}/README.md", 'w', encoding='utf-8') as f:
              f.write(md)
          
          with open(f"results/{artist}/links.txt", 'w') as f:
              f.write(links_txt)
          
          with open(f"results/{artist}/links.json", 'w') as f:
              json.dump({
                  'artist': artist,
                  'query': query,
                  'total': len(tracks),
                  'tracks': json_data
              }, f, indent=2)

          print(f"\n✅ Saved to results/{artist}/")
          PYEOF

      - name: Show
        run: |
          cat results/${{ github.event.inputs.artist }}/links.txt 2>/dev/null || echo "No results"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add results/
          git diff --staged --quiet || git commit -m "🔍 ${{ github.event.inputs.artist }}" && git push
